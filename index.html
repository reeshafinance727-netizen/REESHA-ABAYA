<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abaya House Manager - Full Enterprise</title>
    
    <!-- Scripts & Frameworks (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAj6ykPU9sD-Wmiftp6A68DzAWAZ2mamx4",
            authDomain: "reesha-abaya.firebaseapp.com",
            projectId: "reesha-abaya",
            storageBucket: "reesha-abaya.firebasestorage.app",
            messagingSenderId: "291827178527",
            appId: "1:291827178527:web:ce679495f769e31fc4492a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Global export for React
        window.firebaseDB = db;
        window.firebaseAuth = auth;
        window.firestoreFunctions = { collection, onSnapshot, doc, setDoc, deleteDoc, addDoc };
        window.authFunctions = { signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Sanitizing App ID
        const appId = "reesha-abaya-v1";

        // Helper Icon Component
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        // --- Logo Component ---
        const Logo = ({ size = "md" }) => (
            <div className={`flex flex-col items-center justify-center ${size === "lg" ? "mb-8" : "mb-0"}`}>
                <div className={`rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center shadow-inner ${size === "lg" ? "p-6 mb-4" : "p-3"}`}>
                    <Icon name="package" size={size === "lg" ? 48 : 24} />
                </div>
            </div>
        );

        // --- Delivery Note Template (The Complete Design) ---
        const DeliveryNoteTemplate = ({ data, isEditable, onChange, onCommit, onCancel, showMsg }) => {
            const totalQty = data.items.reduce((sum, item) => sum + (parseInt(item.quantity) || 0), 0);
            
            const handlePrint = () => {
                const printContent = document.getElementById('printable-invoice').innerHTML;
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html>
                        <head>
                            <title>Delivery Note - ${data.dnNo}</title>
                            <script src="https://cdn.tailwindcss.com"><\/script>
                            <style>
                                body { background: white; padding: 40px; font-family: sans-serif; }
                                @media print { .no-print { display: none; } }
                            </style>
                        </head>
                        <body>
                            <div class="max-w-4xl mx-auto">${printContent}</div>
                            <script>window.onload = () => { window.print(); window.close(); };<\/script>
                        </body>
                    </html>
                `);
                printWindow.document.close();
            };

            return (
                <div className="bg-white text-black w-full max-w-4xl mx-auto shadow-2xl relative rounded-xl overflow-hidden mb-20 animate-in">
                    <div className={`p-4 flex justify-between items-center ${isEditable ? 'bg-slate-900 border-indigo-500' : 'bg-green-900 border-green-500'} border-b-4 text-white`}>
                        <span className="font-bold uppercase tracking-widest text-xs">{isEditable ? 'Draft Mode' : 'Ready to Print'}</span>
                        <div className="flex gap-2">
                            {isEditable ? (
                                <>
                                    <button onClick={onCancel} className="px-4 py-1 bg-slate-700 rounded text-xs">Cancel</button>
                                    <button onClick={onCommit} className="px-4 py-1 bg-indigo-600 rounded text-xs font-bold">Save Record</button>
                                </>
                            ) : (
                                <>
                                    <button onClick={() => onChange(null)} className="px-4 py-1 bg-slate-700 rounded text-xs">Close</button>
                                    <button onClick={handlePrint} className="px-4 py-1 bg-blue-600 rounded text-xs font-bold flex items-center gap-2"><Icon name="printer" size={14}/> Print PDF</button>
                                </>
                            )}
                        </div>
                    </div>

                    <div id="printable-invoice" className="p-10 bg-white">
                        <div className="flex flex-col items-center mb-8">
                            <div className="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mb-2">
                                <Icon name="package" size={24} />
                            </div>
                            <h2 className="text-xl font-black tracking-[0.2em]">REESHA ABAYA</h2>
                        </div>
                        <div className="bg-[#fce4ec] border-y border-black py-1 text-center font-bold text-sm mb-6 uppercase">
                            - {data.type === 'monthly' ? 'MONTHLY DISPATCH REPORT' : 'DELIVERY NOTE'}
                        </div>
                        <div className="grid grid-cols-2 text-[10px] mb-6">
                            <div>
                                <p><strong>Registered Name:</strong> REESHA ABAYA HOUSE</p>
                                <p><strong>City:</strong> Lahore, Pakistan</p>
                                <div className="mt-4">
                                    <p className="font-bold uppercase">BILL / SHIP TO:</p>
                                    <p className="font-black text-xs">{data.shopName}</p>
                                </div>
                            </div>
                            <div className="text-right">
                                <p><strong>DN No:</strong> {data.dnNo}</p>
                                <p><strong>Date:</strong> {data.date}</p>
                            </div>
                        </div>
                        <table className="w-full border-collapse border border-black text-[10px]">
                            <thead>
                                <tr className="bg-[#fce4ec]">
                                    <th className="border border-black p-1 w-8">S#</th>
                                    <th className="border border-black p-1 text-left">Code</th>
                                    <th className="border border-black p-1 text-left">Style</th>
                                    <th className="border border-black p-1 w-12">Qty</th>
                                    <th className="border border-black p-1 text-left">Remarks</th>
                                </tr>
                            </thead>
                            <tbody>
                                {data.items.map((item, idx) => (
                                    <tr key={idx}>
                                        <td className="border border-black p-1 text-center">{idx + 1}</td>
                                        <td className="border border-black p-1 font-bold uppercase">{item.article}</td>
                                        <td className="border border-black p-1">{item.modelStyle || '-'}</td>
                                        <td className="border border-black p-1 text-center font-bold">{item.quantity}</td>
                                        <td className="border border-black p-1 text-[8px]">{item.remarks || '-'}</td>
                                    </tr>
                                ))}
                                <tr className="bg-gray-50">
                                    <td colSpan="3" className="border border-black p-2 text-right font-bold uppercase text-[8px]">SUB TOTAL</td>
                                    <td className="border border-black p-2 text-center font-bold text-sm">{totalQty}</td>
                                    <td className="border border-black p-2"></td>
                                </tr>
                            </tbody>
                        </table>
                        <div className="mt-10 border border-black p-4 h-24 text-[10px]">
                            <p className="font-bold">Received in good condition:</p>
                            <div className="mt-8 border-t border-black w-40">Signature</div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App Logic ---
        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [inventory, setInventory] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [selectedShop, setSelectedShop] = useState(null);
            const [draftDocument, setDraftDocument] = useState(null);
            const [printData, setPrintData] = useState(null);
            const [aiInsights, setAiInsights] = useState('');
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [message, setMessage] = useState({ text: '', type: '' });
            const [loginData, setLoginData] = useState({ username: '', password: '' });

            const db = window.firebaseDB;
            const { collection, onSnapshot, doc, setDoc, addDoc, deleteDoc } = window.firestoreFunctions;

            const SHOPS = [
                "ABAYA HOUSE", "AL B LR", "AL-B-G10", "AL-B-GJ", "AL-B-LM", "AL-B-MUL", "AL-B-SRD", 
                "AL-H BHARIA", "AL-H-DHA", "AL-TAIBA", "DIVINLY CRAFTED (MHZ)", "DIVINLY CRAFTED (SJ)", 
                "ENEM", "HZ FT", "REESHA DIRECT", "TIP TOP Fabrics", "REESHA ORDER"
            ];

            useEffect(() => {
                const { signInAnonymously, onAuthStateChanged } = window.authFunctions;
                signInAnonymously(window.firebaseAuth);
                return onAuthStateChanged(window.firebaseAuth, setUser);
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const getRef = (n) => collection(db, 'artifacts', appId, 'public', 'data', n);
                
                const unsubInv = onSnapshot(getRef('inventory'), snap => setInventory(snap.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubTrans = onSnapshot(getRef('transactions'), snap => {
                    const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    data.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
                    setTransactions(data);
                });
                return () => { unsubInv(); unsubTrans(); };
            }, [user, db]);

            const showMsg = (text, type) => {
                setMessage({ text, type });
                setTimeout(() => setMessage({ text: '', type: '' }), 3000);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginData.username === 'admin' && loginData.password === 'ranag3310') setIsLoggedIn(true);
                else showMsg('Wrong credentials!', 'error');
            };

            const getAiInsights = async () => {
                setIsAiLoading(true);
                const invSummary = inventory.map(i => `${i.article}: ${i.quantity}`).join(', ');
                const prompt = `Retail Analyst prompt: Data: ${invSummary}. Give 3 Roman Urdu bullet points for stock trends. Keep it short.`;
                
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=`, {
                        method: 'POST',
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const result = await res.json();
                    setAiInsights(result.candidates?.[0]?.content?.parts?.[0]?.text || "Insights error");
                } catch(e) { setAiInsights("AI Connection failed."); }
                setIsAiLoading(false);
            };

            const commitDN = async () => {
                try {
                    for (const item of draftDocument.items) {
                        const exist = inventory.find(i => i.article === item.article.toUpperCase());
                        if (exist) {
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', exist.id), 
                                { quantity: exist.quantity - item.quantity }, { merge: true });
                        }
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), {
                            ...item, type: 'OUT', shopName: draftDocument.shopName, dnNo: draftDocument.dnNo,
                            timestamp: Date.now(), date: draftDocument.date
                        });
                    }
                    showMsg('Delivery Note Saved!', 'success');
                    setPrintData(draftDocument);
                    setDraftDocument(null);
                } catch(e) { showMsg(e.message, 'error'); }
            };

            const shopGroups = useMemo(() => {
                if (!selectedShop) return {};
                const map = {};
                transactions.filter(t => t.shopName === selectedShop).forEach(t => {
                    const dn = t.dnNo || 'AUTO';
                    if (!map[dn]) map[dn] = { dnNo: dn, date: t.date, total: 0, items: [] };
                    map[dn].items.push(t);
                    map[dn].total += Number(t.quantity);
                });
                return map;
            }, [selectedShop, transactions]);

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border-t-8 border-indigo-600 animate-in">
                            <Logo size="lg" />
                            <h1 className="text-3xl font-black text-center tracking-tighter">ABAYA HOUSE</h1>
                            <p className="text-indigo-600 font-bold uppercase text-center text-[10px] mb-8 tracking-widest">Enterprise Cloud</p>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="text" placeholder="Username" className="w-full p-4 bg-slate-50 border rounded-xl outline-none font-bold" onChange={e => setLoginData({...loginData, username: e.target.value})} />
                                <input type="password" placeholder="Password" className="w-full p-4 bg-slate-50 border rounded-xl outline-none font-bold" onChange={e => setLoginData({...loginData, password: e.target.value})} />
                                <button className="w-full bg-slate-900 text-white font-black py-4 rounded-xl hover:bg-indigo-700 transition-all uppercase text-xs tracking-widest">Login Terminal</button>
                            </form>
                            <p className="mt-8 text-center text-[9px] text-gray-400 font-bold uppercase border-t pt-4">Dev by MR. ABUBAKAR</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Draft Modal */}
                    {draftDocument && (
                        <div className="fixed inset-0 bg-black/90 z-[100] flex justify-center items-start overflow-y-auto pt-20 p-6 backdrop-blur-sm">
                            <DeliveryNoteTemplate data={draftDocument} isEditable={true} onChange={setDraftDocument} onCommit={commitDN} onCancel={() => setDraftDocument(null)} showMsg={showMsg} />
                        </div>
                    )}
                    {/* Print View Modal */}
                    {printData && (
                        <div className="fixed inset-0 bg-black/95 z-[200] flex justify-center items-start overflow-y-auto pt-20 p-6">
                            <DeliveryNoteTemplate data={printData} isEditable={false} onChange={setPrintData} showMsg={showMsg} />
                        </div>
                    )}

                    {/* Sidebar */}
                    <nav className="w-full md:w-64 bg-slate-900 text-white p-6 no-print flex flex-col h-screen sticky top-0">
                        <div className="mb-10 flex items-center gap-3 bg-white/5 p-4 rounded-2xl">
                            <Icon name="package" className="text-indigo-400" size={24}/>
                            <h2 className="font-black text-sm uppercase">Reesha Abaya</h2>
                        </div>
                        <div className="space-y-1 flex-1">
                            {[
                                {id:'dashboard', l:'Dashboard', i:'layout-dashboard'},
                                {id:'shops', l:'Shop Ledger', i:'store'},
                                {id:'inventory', l:'Stock List', i:'list'},
                                {id:'history', l:'Log History', i:'history'}
                            ].map(b => (
                                <button key={b.id} onClick={() => {setActiveTab(b.id); setSelectedShop(null);}} className={`w-full text-left p-4 rounded-xl flex items-center gap-4 font-bold text-xs transition-all ${activeTab === b.id ? 'bg-indigo-600 shadow-lg' : 'hover:bg-white/5 opacity-70'}`}>
                                    <Icon name={b.i} size={18}/> {b.l}
                                </button>
                            ))}
                        </div>
                        <div className="pt-6 border-t border-white/10 text-center">
                            <p className="text-[10px] text-indigo-400 font-bold">MR. ABUBAKAR</p>
                            <button onClick={() => setIsLoggedIn(false)} className="mt-4 text-red-400 font-bold text-[10px] flex items-center gap-2 mx-auto"><Icon name="log-out" size={14}/> LOGOUT</button>
                        </div>
                    </nav>

                    <main className="flex-1 p-8 no-print overflow-y-auto h-screen">
                        <div className="flex justify-between items-center mb-10">
                            <h1 className="text-4xl font-black uppercase tracking-tighter">{selectedShop || activeTab}</h1>
                            <div className="bg-green-100 text-green-700 px-4 py-2 rounded-full text-[10px] font-black border flex items-center gap-2">
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div> CLOUD ACTIVE
                            </div>
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-10 animate-in">
                                {/* AI Section */}
                                <div className="bg-slate-900 rounded-[3rem] p-10 text-white relative overflow-hidden group shadow-2xl">
                                    <div className="absolute top-0 right-0 p-10 opacity-5 group-hover:opacity-10 transition-all"><Icon name="sparkles" size={150} /></div>
                                    <div className="relative z-10">
                                        <h3 className="text-3xl font-black mb-2 flex items-center gap-3">AI Business Analyst <Icon name="sparkles" className="text-amber-400"/></h3>
                                        <p className="text-indigo-300 text-xs font-bold uppercase mb-6 tracking-widest">Gemini Engine Analysis</p>
                                        {!aiInsights ? (
                                            <button onClick={getAiInsights} className="bg-amber-500 text-slate-900 px-8 py-4 rounded-2xl font-black uppercase text-xs hover:bg-amber-400 shadow-xl transition-all">Generate Live Trends</button>
                                        ) : (
                                            <div className="bg-white/5 p-6 rounded-3xl border border-white/10 text-indigo-50 text-sm leading-relaxed whitespace-pre-wrap">{aiInsights}</div>
                                        )}
                                        {isAiLoading && <p className="animate-pulse text-amber-400 font-black mt-4">Analyzing Master Stock...</p>}
                                    </div>
                                </div>

                                {/* Stats */}
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                                    {[
                                        {l:'Total Pcs', v: inventory.reduce((a,b)=>a+b.quantity,0), i:'package', c:'indigo'},
                                        {l:'Articles', v: inventory.length, i:'list', c:'blue'},
                                        {l:'Low Stock', v: inventory.filter(i=>i.quantity<10).length, i:'alert-triangle', c:'red'},
                                        {l:'Log Entries', v: transactions.length, i:'history', c:'slate'}
                                    ].map(s => (
                                        <div key={s.l} className="bg-white p-8 rounded-[2.5rem] shadow-sm border-b-4 border-slate-100 hover:border-indigo-500 transition-all">
                                            <Icon name={s.i} className={`text-${s.c}-500 mb-4`} size={32}/>
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{s.l}</p>
                                            <h4 className="text-4xl font-black text-slate-800 tracking-tighter">{s.v}</h4>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'shops' && !selectedShop && (
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6 animate-in">
                                {SHOPS.map(s => (
                                    <button key={s} onClick={() => setSelectedShop(s)} className="bg-white p-8 rounded-[2rem] shadow-sm border-b-4 hover:border-indigo-600 transition-all text-left group">
                                        <div className="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center mb-6 group-hover:bg-indigo-600 group-hover:text-white transition-all"><Icon name="folder-open" size={24}/></div>
                                        <h4 className="font-black text-xs uppercase text-slate-800 leading-tight">{s}</h4>
                                        <p className="text-[9px] text-slate-400 font-bold mt-2">Open Records</p>
                                    </button>
                                ))}
                            </div>
                        )}

                        {selectedShop && (
                            <div className="space-y-10 animate-in">
                                <button onClick={() => setSelectedShop(null)} className="flex items-center gap-2 text-indigo-600 font-black uppercase text-[10px] mb-4"><Icon name="chevron-left" size={14}/> Back to Directory</button>
                                <div className="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                    <h4 className="text-lg font-black mb-6 uppercase tracking-widest">Manual Dispatch</h4>
                                    <div className="flex gap-4">
                                        <select id="articleSelect" className="flex-1 p-4 bg-slate-50 border rounded-2xl font-black text-sm uppercase">
                                            <option value="">Select Article</option>
                                            {inventory.filter(i=>i.quantity>0).map(i=>(<option key={i.id} value={JSON.stringify(i)}>{i.article} ({i.quantity} Pcs)</option>))}
                                        </select>
                                        <input id="qtyInput" type="number" placeholder="Qty" className="w-32 p-4 bg-slate-50 border rounded-2xl font-black text-center text-xl" />
                                        <button onClick={() => {
                                            const art = JSON.parse(document.getElementById('articleSelect').value || '{}');
                                            const qty = parseInt(document.getElementById('qtyInput').value);
                                            if(!art.id || isNaN(qty)) return showMsg('Incomplete details!', 'error');
                                            setDraftDocument({
                                                type: 'dn', shopName: selectedShop, dnNo: `DN-${Math.floor(1000+Math.random()*9000)}`,
                                                date: new Date().toLocaleDateString(), items: [{article: art.article, quantity: qty}]
                                            });
                                        }} className="bg-indigo-600 text-white px-8 rounded-2xl font-black uppercase text-xs shadow-xl">Create DN</button>
                                    </div>
                                </div>
                                <div className="bg-white rounded-[2rem] border overflow-hidden shadow-sm">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black uppercase tracking-widest border-b">
                                            <tr><th className="p-6">DN No</th><th className="p-6">Date</th><th className="p-6 text-center">Pcs</th><th className="p-6 text-center">View</th></tr>
                                        </thead>
                                        <tbody>
                                            {Object.values(shopGroups).map(doc => (
                                                <tr key={doc.dnNo} className="border-b last:border-0 hover:bg-slate-50">
                                                    <td className="p-6 font-black uppercase text-indigo-600">{doc.dnNo}</td>
                                                    <td className="p-6 font-bold text-slate-400 text-xs">{doc.date}</td>
                                                    <td className="p-6 text-center font-black text-xl">{doc.total}</td>
                                                    <td className="p-6 text-center">
                                                        <button onClick={() => setPrintData({shopName:selectedShop, dnNo:doc.dnNo, date:doc.date, items:doc.items})} className="p-3 bg-slate-100 rounded-xl hover:bg-indigo-600 hover:text-white transition-all"><Icon name="printer" size={18}/></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'inventory' && (
                            <div className="bg-white rounded-[3rem] shadow-sm border overflow-hidden animate-in">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 text-[11px] font-black uppercase border-b">
                                        <tr><th className="p-8">Article</th><th className="p-8 text-center">Stock</th><th className="p-8">Target</th></tr>
                                    </thead>
                                    <tbody>
                                        {inventory.map(i => (
                                            <tr key={i.id} className="border-b last:border-0 hover:bg-slate-50 transition-colors">
                                                <td className="p-8 font-black text-2xl uppercase tracking-tighter">{i.article}</td>
                                                <td className="p-8 text-center font-black text-3xl text-indigo-600">{i.quantity}</td>
                                                <td className="p-8 text-slate-400 font-bold uppercase text-[10px]">{i.forWhom || 'General'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="bg-white rounded-[3rem] shadow-sm border overflow-hidden animate-in">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 text-[10px] font-black uppercase border-b">
                                        <tr><th className="p-8">Log Time</th><th className="p-8">Action</th><th className="p-8">Article</th><th className="p-8 text-right">Pcs</th></tr>
                                    </thead>
                                    <tbody>
                                        {transactions.map((t, idx) => (
                                            <tr key={idx} className="border-b last:border-0 hover:bg-slate-50">
                                                <td className="p-8 text-[10px] font-bold text-slate-400">{t.date}</td>
                                                <td className="p-8"><span className={`px-3 py-1 rounded text-[10px] font-black ${t.type==='OUT'?'bg-red-50 text-red-600':'bg-green-50 text-green-600'}`}>{t.type}</span></td>
                                                <td className="p-8 font-black uppercase text-xl">{t.article}</td>
                                                <td className="p-8 text-right font-black text-2xl text-indigo-600">{t.quantity}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>

                    {/* Global Message */}
                    {message.text && (
                        <div className={`fixed bottom-10 right-10 p-6 rounded-3xl shadow-2xl z-[1000] flex items-center gap-4 border-4 animate-in ${message.type==='success'?'bg-green-50 text-green-700 border-green-200':'bg-red-50 text-red-700 border-red-200'}`}>
                            <Icon name={message.type==='success'?'check-circle':'alert-circle'} />
                            <p className="font-black text-sm uppercase">{message.text}</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
