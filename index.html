<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abaya House Manager - Live</title>
    <!-- Scripts & Frameworks -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyAj6ykPU9sD-Wmiftp6A68DzAWAZ2mamx4",
            authDomain: "reesha-abaya.firebaseapp.com",
            projectId: "reesha-abaya",
            storageBucket: "reesha-abaya.firebasestorage.app",
            messagingSenderId: "291827178527",
            appId: "1:291827178527:web:ce679495f769e31fc4492a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Global variables for React to use
        window.firebaseDB = db;
        window.firebaseAuth = auth;
        window.firestoreTools = { collection, onSnapshot, doc, setDoc, deleteDoc, addDoc };
        window.authTools = { signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .print-area { display: none; }
        @media print {
            .no-print { display: none !important; }
            .print-area { display: block !important; width: 100%; }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Sanitizing App ID for Firebase Path Rules ---
        const rawAppId = "reesha-abaya-v1";
        const appId = rawAppId.replace(/\//g, '_');

        // Helper for Lucide Icons in React CDN
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        // --- APP START ---
        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [inventory, setInventory] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [loginData, setLoginData] = useState({ username: '', password: '' });
            const [message, setMessage] = useState({ text: '', type: '' });

            const db = window.firebaseDB;
            const { collection, onSnapshot, doc, setDoc, deleteDoc, addDoc } = window.firestoreTools;

            // Auth Logic (Rule 3: Auth before Queries)
            useEffect(() => {
                const { signInAnonymously, onAuthStateChanged } = window.authTools;
                const init = async () => {
                    await signInAnonymously(window.firebaseAuth);
                };
                init();
                return onAuthStateChanged(window.firebaseAuth, (u) => {
                    setUser(u);
                    console.log("Cloud Connected:", u ? u.uid : "Offline");
                });
            }, []);

            // Data Sync (Rule 1: Strict Paths)
            useEffect(() => {
                if (!user || !db) return;
                const path = `artifacts/${appId}/public/data/inventory`;
                const transPath = `artifacts/${appId}/public/data/transactions`;

                const unsubInv = onSnapshot(collection(db, ...path.split('/')), (snap) => {
                    setInventory(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });

                const unsubTrans = onSnapshot(collection(db, ...transPath.split('/')), (snap) => {
                    const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    data.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
                    setTransactions(data);
                });

                return () => { unsubInv(); unsubTrans(); };
            }, [user, db]);

            const showMsg = (text, type) => {
                setMessage({ text, type });
                setTimeout(() => setMessage({ text: '', type: '' }), 3000);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginData.username === 'admin' && loginData.password === 'ranag3310') {
                    setIsLoggedIn(true);
                } else { showMsg('Invalid Credentials!', 'error'); }
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
                        <div className="bg-white p-10 rounded-[2rem] shadow-2xl w-full max-w-md border-t-8 border-indigo-600">
                            <div className="text-center mb-8">
                                <div className="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name="package" size={40} />
                                </div>
                                <h1 className="text-3xl font-black text-slate-800 tracking-tighter">ABAYA HOUSE</h1>
                                <p className="text-indigo-600 font-bold uppercase tracking-widest text-xs">Cloud Terminal</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-5">
                                <input type="text" placeholder="Username" className="w-full p-4 bg-slate-50 border rounded-xl outline-none font-bold" onChange={e => setLoginData({...loginData, username: e.target.value})} />
                                <input type="password" placeholder="Password" className="w-full p-4 bg-slate-50 border rounded-xl outline-none font-bold" onChange={e => setLoginData({...loginData, password: e.target.value})} />
                                <button className="w-full bg-slate-900 text-white font-black py-4 rounded-xl hover:bg-indigo-700 transition-all uppercase tracking-widest text-xs">Enter System</button>
                            </form>
                            <p className="mt-8 text-center text-[10px] text-gray-400 font-bold uppercase border-t pt-4">Developed by MR. ABUBAKAR</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Sidebar */}
                    <nav className="w-full md:w-64 bg-slate-900 text-white p-6 no-print">
                        <div className="mb-10 flex items-center gap-3">
                            <div className="p-2 bg-indigo-600 rounded-lg"><Icon name="package" /></div>
                            <h2 className="font-black text-lg">REESHA</h2>
                        </div>
                        <div className="space-y-2">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full text-left p-3 rounded-xl flex items-center gap-3 font-bold text-sm ${activeTab === 'dashboard' ? 'bg-indigo-600' : 'hover:bg-white/5'}`}>
                                <Icon name="layout-dashboard" size={18} /> Dashboard
                            </button>
                            <button onClick={() => setActiveTab('inventory')} className={`w-full text-left p-3 rounded-xl flex items-center gap-3 font-bold text-sm ${activeTab === 'inventory' ? 'bg-indigo-600' : 'hover:bg-white/5'}`}>
                                <Icon name="list" size={18} /> Stock List
                            </button>
                            <button onClick={() => setIsLoggedIn(false)} className="w-full text-left p-3 rounded-xl flex items-center gap-3 font-bold text-sm text-red-400 mt-10">
                                <Icon name="log-out" size={18} /> Logout
                            </button>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="flex-1 p-8 no-print">
                        <div className="flex justify-between items-center mb-8">
                            <h1 className="text-3xl font-black uppercase tracking-tighter">{activeTab}</h1>
                            <div className="flex items-center gap-2 bg-green-100 text-green-700 px-4 py-2 rounded-full text-[10px] font-black">
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div> ONLINE ACTIVE
                            </div>
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="bg-white p-8 rounded-3xl shadow-sm border-b-4 border-indigo-600">
                                    <p className="text-xs font-black text-slate-400 uppercase mb-2">Total Stock</p>
                                    <h3 className="text-4xl font-black text-slate-800">{inventory.reduce((a,b) => a + b.quantity, 0)} Pcs</h3>
                                </div>
                                <div className="bg-white p-8 rounded-3xl shadow-sm border-b-4 border-indigo-600">
                                    <p className="text-xs font-black text-slate-400 uppercase mb-2">Articles</p>
                                    <h3 className="text-4xl font-black text-slate-800">{inventory.length}</h3>
                                </div>
                            </div>
                        )}

                        {activeTab === 'inventory' && (
                            <div className="bg-white rounded-3xl shadow-sm overflow-hidden border">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 text-[10px] font-black uppercase tracking-widest border-b">
                                        <tr><th className="p-6">Article</th><th className="p-6">Quantity</th><th className="p-6">Allocation</th></tr>
                                    </thead>
                                    <tbody>
                                        {inventory.map(item => (
                                            <tr key={item.id} className="border-b last:border-0 hover:bg-slate-50">
                                                <td className="p-6 font-black text-xl">{item.article}</td>
                                                <td className="p-6 font-black text-2xl text-indigo-600">{item.quantity}</td>
                                                <td className="p-6 text-slate-400 font-bold uppercase text-xs">{item.forWhom}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>

                    {/* Messages */}
                    {message.text && (
                        <div className={`fixed bottom-10 right-10 p-6 rounded-2xl shadow-2xl flex items-center gap-4 border-4 animate-bounce ${message.type === 'success' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-red-50 text-red-700 border-red-200'}`}>
                            <Icon name={message.type === 'success' ? "check-circle" : "alert-circle"} />
                            <p className="font-black text-sm uppercase">{message.text}</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
