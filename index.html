<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REESHA ABAYA - Delivery System</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        // Basic React setup
        const { useState } = React;

        function App() {
            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    <div class="bg-white p-8 rounded-lg shadow-2xl text-center max-w-md w-full">
                        <h1 className="text-4xl font-extrabold text-gray-900 mb-4">REESHA ABAYA</h1>
                        <div class="border-t-4 border-blue-600 w-24 mx-auto mb-6"></div>
                        <p className="text-xl text-gray-700 mb-8">Software Internet Par Live Ho Gaya Hai!</p>
                        <p className="text-sm text-gray-500">Agar aap ye design dekh rahe hain toh GitHub Pages sahi kaam kar raha hai. Ab aap kisi ko bhi ye link bhej sakte hain.</p>
                    </div>
                </div>
            );
        }

        // Software ko screen par dikhana
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
