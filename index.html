<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abaya House Manager</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <!-- Babel for React JSX Compilation in Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        .uppercase-input { text-transform: uppercase; }
        
        @media print {
            body, html { background: white !important; margin: 0; padding: 0; height: auto; }
            .print-hide { display: none !important; }
            @page { margin: 15mm; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import { 
          LayoutDashboard, PlusCircle, Store, Package, History, 
          LogOut, Moon, Sun, Trash2, Edit, Printer, FileText, 
          Upload, Download, AlertTriangle, Sparkles, X, ChevronRight, Check,
          Settings, UserPlus, Shield, Lock
        } from 'https://esm.sh/lucide-react@0.263.1';
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, getDoc, deleteDoc, updateDoc, query, orderBy, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // ============================================================================
        // 🔴 FIREBASE CONFIGURATION 🔴
        // ============================================================================
        const fallbackConfig = {
            apiKey: "AIzaSyAj6yKpU9sD-Wmiftp6A68DzAWAZ2mamx4",
            authDomain: "reesha-abaya.firebaseapp.com",
            databaseURL: "https://reesha-abaya-default-rtdb.firebaseio.com",
            projectId: "reesha-abaya",
            storageBucket: "reesha-abaya.firebasestorage.app",
            messagingSenderId: "291827178527",
            appId: "1:291827178527:web:ce679495f769e31fc4492a" // <-- BHAI YAHAN APNA APP ID LIKHNA HAI!
        };
        const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY"; // AI Tips ke liye
        // ============================================================================

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'abaya-house-mgr-v1';
        const sanitizedAppId = appId.replace(/\//g, '_');

        let app, auth, db;
        try {
            const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
            const config = configStr ? JSON.parse(configStr) : fallbackConfig;
            
            if(config.apiKey !== "YOUR_API_KEY") {
                app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);
            }
        } catch (e) {
            console.error("Firebase initialization failed", e);
        }

        const COLLECTIONS = {
          INVENTORY: 'inventory',
          TRANSACTIONS: 'transactions',
          DELIVERY_NOTES: 'deliveryNotes',
          SHOPS: 'shops',
          USERS: 'users'
        };

        // --- UI Components ---
        const Card = ({ children, className = "", onClick }) => (
          <div onClick={onClick} className={`bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden ${className}`}>
            {children}
          </div>
        );

        const Button = ({ children, onClick, variant = 'primary', className = "", icon: Icon, disabled = false, type="button" }) => {
          const baseStyle = "inline-flex items-center justify-center px-4 py-2 text-sm font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed";
          const variants = {
            primary: "bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-500",
            secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200 dark:bg-slate-700 dark:text-slate-200 dark:hover:bg-slate-600",
            danger: "bg-red-600 text-white hover:bg-red-700 focus:ring-red-500",
            outline: "border border-slate-300 text-slate-700 hover:bg-slate-50 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-800"
          };
          
          return (
            <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
              {Icon && <Icon className="w-4 h-4 mr-2" />}
              {children}
            </button>
          );
        };

        const Input = ({ label, type = "text", value, onChange, placeholder, required = false, className="" }) => (
          <div className={`mb-4 ${className}`}>
            {label && <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">{label} {required && <span className="text-red-500">*</span>}</label>}
            <input
              type={type}
              value={value}
              onChange={onChange}
              required={required}
              placeholder={placeholder}
              className="w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:bg-slate-800 dark:border-slate-600 dark:text-white"
            />
          </div>
        );

        const Modal = ({ isOpen, onClose, title, children, footer }) => {
          if (!isOpen) return null;
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm animate-in fade-in duration-200">
              <div className="bg-white dark:bg-slate-800 rounded-xl shadow-xl w-full max-w-lg overflow-hidden animate-in zoom-in-95 duration-200">
                <div className="flex justify-between items-center p-4 border-b border-slate-200 dark:border-slate-700">
                  <h3 className="text-lg font-semibold text-slate-900 dark:text-white">{title}</h3>
                  <button onClick={onClose} className="text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">
                    <X className="w-5 h-5" />
                  </button>
                </div>
                <div className="p-4 max-h-[70vh] overflow-y-auto">
                  {children}
                </div>
                {footer && (
                  <div className="p-4 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-end gap-2">
                    {footer}
                  </div>
                )}
              </div>
            </div>
          );
        };

        const generateId = () => Math.random().toString(36).substring(2, 9) + Date.now().toString(36);
        const formatDate = (timestamp) => {
          if (!timestamp) return 'N/A';
          const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
          return new Intl.DateTimeFormat('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }).format(date);
        };

        const parseBasicCSV = (csvText) => {
          const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
          if (lines.length < 2) return [];
          const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/["']/g, ''));
          const data = [];
          for (let i = 1; i < lines.length; i++) {
            const values = lines[i].split(',');
            const entry = {};
            headers.forEach((h, index) => {
              entry[h] = values[index] ? values[index].trim().replace(/["']/g, '') : '';
            });
            data.push(entry);
          }
          return data;
        };

        // --- Main App Component ---
        function App() {
          const [isAppAuthenticated, setIsAppAuthenticated] = useState(false);
          const [firebaseUser, setFirebaseUser] = useState(null);
          const [theme, setTheme] = useState('dark');
          const [activeTab, setActiveTab] = useState('dashboard');
          
          const [inventory, setInventory] = useState([]);
          const [transactions, setTransactions] = useState([]);
          const [deliveryNotes, setDeliveryNotes] = useState([]);
          const [appShops, setAppShops] = useState([]);
          const [appUsers, setAppUsers] = useState([]);
          const [loading, setLoading] = useState(true);
          
          const [loggedInUser, setLoggedInUser] = useState(null);
          const [toast, setToast] = useState(null);
          const [printData, setPrintData] = useState(null); 
          const [dbError, setDbError] = useState(null); // Naya Error System
          
          const showToast = (message, type = 'success') => {
            setToast({ message, type });
            setTimeout(() => setToast(null), 3000);
          };

          useEffect(() => {
            if (theme === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
          }, [theme]);

          // AUTHENTICATION FIX CHECK
          useEffect(() => {
            const initAuth = async () => {
              if (!auth) {
                setDbError("Firebase App Initialize nahi hui. Kya aapne sahi se Config paste kiya tha?");
                return;
              }
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (error) {
                console.error("Auth error", error);
                setDbError("⚠️ FIREBASE ERROR: Aapki app database se connect nahi ho rahi!\n\nHal (Fix): Apne Firebase Console mein jayen -> Build -> Authentication -> Sign-in method -> wahan list mein 'Anonymous' ko dhoond kar Enable karein aur Save karein!");
              }
            };
            initAuth();

            if (auth) {
              const unsub = onAuthStateChanged(auth, (user) => {
                setFirebaseUser(user);
              });
              return () => unsub();
            }
          }, []);

          // DATABASE RULES CHECK
          useEffect(() => {
            if (!firebaseUser || !db) return;

            const getCollectionRef = (colName) => collection(db, 'artifacts', sanitizedAppId, 'public', 'data', colName);

            setLoading(true);
            
            const handleDbError = (err) => {
                console.error("DB Error", err);
                setDbError("⚠️ FIREBASE RULES ERROR: Data save/read nahi ho raha!\n\nHal (Fix): Firebase Console -> Firestore Database -> Rules tab mein jayen aur wahan 'allow read, write: if true;' likh kar Publish karein.");
            };

            const unsubInventory = onSnapshot(getCollectionRef(COLLECTIONS.INVENTORY), (snapshot) => {
              setInventory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            }, handleDbError);

            const unsubTransactions = onSnapshot(getCollectionRef(COLLECTIONS.TRANSACTIONS), (snapshot) => {
              const txs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              txs.sort((a, b) => b.date - a.date);
              setTransactions(txs);
            }, handleDbError);

            const unsubDN = onSnapshot(getCollectionRef(COLLECTIONS.DELIVERY_NOTES), (snapshot) => {
              const dns = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              dns.sort((a, b) => b.date - a.date);
              setDeliveryNotes(dns);
              setLoading(false);
            }, handleDbError);

            const unsubShops = onSnapshot(getCollectionRef(COLLECTIONS.SHOPS), (snapshot) => {
              setAppShops(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            }, handleDbError);

            const unsubUsers = onSnapshot(getCollectionRef(COLLECTIONS.USERS), (snapshot) => {
              setAppUsers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            }, handleDbError);

            return () => {
              unsubInventory();
              unsubTransactions();
              unsubDN();
              unsubShops();
              unsubUsers();
            };
          }, [firebaseUser]);

          const getCollectionRef = (colName) => collection(db, 'artifacts', sanitizedAppId, 'public', 'data', colName);

          const handleWipeData = async () => {
            if (!window.confirm("Are you absolutely sure you want to WIPE ALL DATA? This cannot be undone.")) return;
            try {
              const allDeletes = [];
              inventory.forEach(item => allDeletes.push(deleteDoc(doc(db, 'artifacts', sanitizedAppId, 'public', 'data', COLLECTIONS.INVENTORY, item.id))));
              transactions.forEach(item => allDeletes.push(deleteDoc(doc(db, 'artifacts', sanitizedAppId, 'public', 'data', COLLECTIONS.TRANSACTIONS, item.id))));
              deliveryNotes.forEach(item => allDeletes.push(deleteDoc(doc(db, 'artifacts', sanitizedAppId, 'public', 'data', COLLECTIONS.DELIVERY_NOTES, item.id))));
              
              await Promise.all(allDeletes);
              showToast("All data wiped successfully", "success");
            } catch (e) {
              console.error(e);
              showToast("Failed to wipe data", "error");
            }
          };

          const handleAddStock = async (articleId, quantity, target, style = '') => {
            if (!articleId || quantity <= 0) return false;
            try {
              const existingItem = inventory.find(i => i.articleId.toLowerCase() === articleId.toLowerCase());
              const newQty = parseInt(quantity);
              
              if (existingItem) {
                await updateDoc(doc(getCollectionRef(COLLECTIONS.INVENTORY), existingItem.id), {
                  quantity: existingItem.quantity + newQty,
                  lastUpdated: Date.now()
                });
              } else {
                await setDoc(doc(getCollectionRef(COLLECTIONS.INVENTORY), generateId()), {
                  articleId: articleId.toUpperCase(),
                  style: style,
                  quantity: newQty,
                  target: target,
                  lastUpdated: Date.now()
                });
              }

              await setDoc(doc(getCollectionRef(COLLECTIONS.TRANSACTIONS), generateId()), {
                type: 'IN',
                articleId: articleId.toUpperCase(),
                quantity: newQty,
                shopName: null,
                remarks: target || 'Manual Intake',
                date: Date.now()
              });
              
              return true;
            } catch (e) {
              console.error(e);
              showToast("Error adding stock", "error");
              return false;
            }
          };

          const handleDispatch = async (shopName, items, remarks = '') => {
            try {
              const batch = writeBatch(db);
              const dnNumber = `DN-${Date.now().toString().slice(-6)}`;
              const dnItems = [];
              let totalPieces = 0;

              for (const item of items) {
                const invItem = inventory.find(i => i.articleId === item.articleId);
                const qtyToDispatch = parseInt(item.quantity);
                
                if (!invItem || invItem.quantity < qtyToDispatch) {
                  throw new Error(`Not enough stock for ${item.articleId}`);
                }

                const invRef = doc(getCollectionRef(COLLECTIONS.INVENTORY), invItem.id);
                batch.update(invRef, { quantity: invItem.quantity - qtyToDispatch });

                const txRef = doc(getCollectionRef(COLLECTIONS.TRANSACTIONS), generateId());
                batch.set(txRef, {
                  type: 'OUT',
                  articleId: item.articleId,
                  quantity: qtyToDispatch,
                  shopName: shopName,
                  remarks: remarks || `Dispatched to ${shopName}`,
                  dnNumber: dnNumber,
                  date: Date.now()
                });

                dnItems.push({
                  articleId: item.articleId,
                  style: invItem.style || '-',
                  quantity: qtyToDispatch,
                  remarks: remarks
                });
                totalPieces += qtyToDispatch;
              }

              const dnRef = doc(getCollectionRef(COLLECTIONS.DELIVERY_NOTES), dnNumber);
              batch.set(dnRef, {
                dnNumber,
                shopName,
                date: Date.now(),
                items: dnItems,
                totalPieces
              });

              await batch.commit();
              
              showToast("Dispatch successful. Delivery Note Generated.", "success");
              return true;
            } catch (e) {
              console.error(e);
              showToast(e.message || "Error processing dispatch", "error");
              return false;
            }
          };

          const handleLogin = (u, p) => {
            if(!db) {
              showToast("Developer: Update Firebase Config in Code First!", "error");
              return;
            }

            const userDoc = appUsers.find(user => user.username === u && user.password === p);
            if (userDoc) {
              setLoggedInUser(userDoc);
              setIsAppAuthenticated(true);
            } else if (appUsers.length === 0 && u === 'admin' && p === 'ranag3310') {
              setLoggedInUser({ username: 'admin', role: 'admin' });
              setIsAppAuthenticated(true);
            } else {
              showToast("Invalid credentials", "error");
            }
          };

          if (!isAppAuthenticated) {
            return (
              <div className="relative">
                {/* Global Error Banner (Login Screen) */}
                {dbError && (
                    <div className="absolute top-0 left-0 w-full z-50 p-4 bg-red-600 text-white font-bold text-center shadow-lg whitespace-pre-wrap">
                        {dbError}
                    </div>
                )}
                <LoginView onLogin={handleLogin} toast={toast} />
              </div>
            );
          }

          if (printData) {
            return (
              <div className="bg-white text-black min-h-screen" style={{ WebkitPrintColorAdjust: 'exact', printColorAdjust: 'exact' }}>
                <div className="max-w-4xl mx-auto p-8 print:p-0">
                  <div className="flex justify-between mb-8 print-hide">
                    <Button variant="outline" icon={X} onClick={() => setPrintData(null)}>Close & Go Back</Button>
                    <Button icon={Printer} onClick={() => { window.focus(); window.print(); }}>Print Document / Save PDF</Button>
                  </div>
                  
                  <div className="border border-gray-300 p-8 print:border-none print:p-0">
                    <div className="text-center border-b-2 border-black pb-4 mb-6">
                      <h1 className="text-3xl font-bold uppercase tracking-wider mb-2">ABAYA HOUSE</h1>
                      <p className="text-sm text-gray-600 uppercase">Enterprise Inventory & Dispatch</p>
                      <h2 className="text-xl font-bold mt-4 bg-gray-200 print:bg-gray-200 inline-block px-4 py-1">DELIVERY NOTE</h2>
                    </div>
                    
                    <div className="flex justify-between mb-8 text-sm">
                      <div>
                        <p><strong>To:</strong> {printData.shopName}</p>
                        <p><strong>Date:</strong> {formatDate(printData.date)}</p>
                      </div>
                      <div className="text-right">
                        <p><strong>DN Number:</strong> {printData.dnNumber}</p>
                      </div>
                    </div>

                    <table className="w-full text-left border-collapse border border-black mb-8 text-sm">
                      <thead>
                        <tr className="bg-gray-100 print:bg-gray-200">
                          <th className="border border-black p-2 w-16 text-center">S.No</th>
                          <th className="border border-black p-2">Article ID</th>
                          <th className="border border-black p-2">Style</th>
                          <th className="border border-black p-2 w-24 text-center">Quantity</th>
                          <th className="border border-black p-2">Remarks</th>
                        </tr>
                      </thead>
                      <tbody>
                        {printData.items.map((item, idx) => (
                          <tr key={idx}>
                            <td className="border border-black p-2 text-center">{idx + 1}</td>
                            <td className="border border-black p-2 font-medium">{item.articleId}</td>
                            <td className="border border-black p-2">{item.style}</td>
                            <td className="border border-black p-2 text-center">{item.quantity}</td>
                            <td className="border border-black p-2">{item.remarks}</td>
                          </tr>
                        ))}
                      </tbody>
                      <tfoot>
                        <tr className="font-bold bg-gray-50 print:bg-gray-100">
                          <td colSpan="3" className="border border-black p-2 text-right">TOTAL PIECES:</td>
                          <td className="border border-black p-2 text-center text-lg">{printData.totalPieces}</td>
                          <td className="border border-black p-2"></td>
                        </tr>
                      </tfoot>
                    </table>

                    <div className="flex justify-between mt-24 pt-8 text-sm">
                      <div className="text-center w-48 border-t border-black pt-2">
                        <p>Prepared By</p>
                        <p className="text-gray-500 text-xs">{loggedInUser?.username || 'Admin'}</p>
                      </div>
                      <div className="text-center w-48 border-t border-black pt-2">
                        <p>Received By</p>
                        <p className="text-gray-500 text-xs">(Signature & Stamp)</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className={`flex h-screen w-full bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans transition-colors duration-200 relative`}>
              
              {/* Global Error Banner (Inside App) */}
              {dbError && (
                  <div className="absolute top-0 left-0 w-full z-[100] p-4 bg-red-600 text-white font-bold text-center shadow-lg whitespace-pre-wrap">
                      {dbError}
                  </div>
              )}

              <div className="w-64 bg-slate-900 text-slate-300 flex flex-col shadow-xl flex-shrink-0 z-10">
                <div className="p-6 flex items-center gap-3">
                  <div className="w-8 h-8 rounded bg-indigo-500 flex items-center justify-center text-white font-bold">AH</div>
                  <span className="text-lg font-bold text-white tracking-wide">Manager</span>
                </div>
                
                <nav className="flex-1 px-4 space-y-2 mt-4">
                  <NavItem icon={LayoutDashboard} label="Dashboard" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                  <NavItem icon={PlusCircle} label="Master Intake" active={activeTab === 'add'} onClick={() => setActiveTab('add')} />
                  <NavItem icon={Store} label="Shop Ledgers" active={activeTab === 'shops'} onClick={() => setActiveTab('shops')} />
                  <NavItem icon={Package} label="Current Stock" active={activeTab === 'inventory'} onClick={() => setActiveTab('inventory')} />
                  <NavItem icon={History} label="History Log" active={activeTab === 'history'} onClick={() => setActiveTab('history')} />
                  {loggedInUser?.role === 'admin' && (
                    <NavItem icon={Settings} label="Master Data" active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} />
                  )}
                </nav>

                <div className="p-4 border-t border-slate-800">
                  <div className="flex items-center justify-between mb-4 px-2">
                    <span className="text-sm">Theme</span>
                    <button onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} className="p-2 rounded-full hover:bg-slate-800 transition-colors">
                      {theme === 'dark' ? <Sun className="w-4 h-4 text-yellow-400" /> : <Moon className="w-4 h-4 text-indigo-400" />}
                    </button>
                  </div>
                  <button onClick={() => setIsAppAuthenticated(false)} className="flex items-center gap-2 w-full px-4 py-2 text-sm text-red-400 hover:bg-slate-800 rounded-lg transition-colors">
                    <LogOut className="w-4 h-4" /> Sign Out
                  </button>
                </div>
              </div>

              <div className={`flex-1 flex flex-col overflow-hidden relative ${dbError ? 'pt-16' : ''}`}>
                <header className="h-16 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-8 flex-shrink-0 z-10 shadow-sm">
                  <h1 className="text-xl font-semibold capitalize">{activeTab.replace(/([A-Z])/g, ' $1').trim()}</h1>
                  <div className="flex items-center gap-4">
                    {loading && !dbError && <span className="text-sm text-slate-500 animate-pulse">Syncing Database...</span>}
                    <div className="w-8 h-8 rounded-full bg-indigo-100 dark:bg-indigo-900 flex items-center justify-center text-indigo-600 dark:text-indigo-300 font-bold border border-indigo-200 dark:border-indigo-700 uppercase">
                      {loggedInUser?.username?.charAt(0) || 'A'}
                    </div>
                  </div>
                </header>
                
                <main className="flex-1 overflow-y-auto p-8 relative">
                  <div className="max-w-6xl mx-auto space-y-6 pb-20">
                    {activeTab === 'dashboard' && <DashboardView inventory={inventory} transactions={transactions} onWipe={handleWipeData} showToast={showToast} loggedInUser={loggedInUser} />}
                    {activeTab === 'add' && <AddStockView onAdd={handleAddStock} showToast={showToast} />}
                    {activeTab === 'shops' && <ShopsView shops={appShops} inventory={inventory} onDispatch={handleDispatch} deliveryNotes={deliveryNotes} showToast={showToast} onPrint={setPrintData} />}
                    {activeTab === 'inventory' && <InventoryView inventory={inventory} getCollectionRef={getCollectionRef} showToast={showToast} />}
                    {activeTab === 'history' && <HistoryView transactions={transactions} />}
                    {activeTab === 'settings' && loggedInUser?.role === 'admin' && <MasterDataView appShops={appShops} appUsers={appUsers} getCollectionRef={getCollectionRef} showToast={showToast} />}
                  </div>
                </main>

                {toast && (
                  <div className={`absolute bottom-6 right-6 px-6 py-3 rounded-lg shadow-lg flex items-center gap-3 animate-in slide-in-from-bottom-5 duration-300 z-50 ${
                    toast.type === 'error' ? 'bg-red-600 text-white' : 'bg-green-600 text-white'
                  }`}>
                    {toast.type === 'error' ? <AlertTriangle className="w-5 h-5" /> : <Check className="w-5 h-5" />}
                    {toast.message}
                  </div>
                )}
              </div>
            </div>
          );
        }

        // --- Sub Views Components ---
        const NavItem = ({ icon: Icon, label, active, onClick }) => (
          <button
            onClick={onClick}
            className={`flex items-center gap-3 w-full px-4 py-3 rounded-lg text-sm font-medium transition-all ${
              active 
                ? 'bg-indigo-600 text-white shadow-md' 
                : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'
            }`}
          >
            <Icon className="w-5 h-5" />
            {label}
          </button>
        );

        const LoginView = ({ onLogin, toast }) => {
          const [username, setUsername] = useState('');
          const [password, setPassword] = useState('');

          return (
            <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white">
              <div className="w-full max-w-md p-8 bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 mt-12">
                <div className="text-center mb-8">
                  <div className="w-16 h-16 bg-indigo-600 rounded-xl mx-auto flex items-center justify-center text-2xl font-bold mb-4 shadow-lg shadow-indigo-500/30">AH</div>
                  <h1 className="text-2xl font-bold tracking-tight">Abaya House</h1>
                  <p className="text-slate-400 text-sm mt-1">Enterprise Management Portal</p>
                </div>
                <form onSubmit={(e) => { e.preventDefault(); onLogin(username, password); }} className="space-y-4">
                  <Input label="Username" value={username} onChange={e => setUsername(e.target.value)} required />
                  <Input label="Password" type="password" value={password} onChange={e => setPassword(e.target.value)} required />
                  <Button type="submit" className="w-full mt-6 py-3 text-lg">Login to Portal</Button>
                </form>
                {toast && (
                  <div className="mt-4 p-3 bg-red-500/20 text-red-400 text-sm text-center rounded-lg border border-red-500/50">
                    {toast.message}
                  </div>
                )}
              </div>
            </div>
          );
        };

        const DashboardView = ({ inventory, transactions, onWipe, showToast, loggedInUser }) => {
          const stats = useMemo(() => {
            let totalPieces = 0;
            let lowStock = 0;
            inventory.forEach(i => {
              totalPieces += i.quantity;
              if (i.quantity < 10) lowStock++;
            });
            return {
              totalPieces,
              totalArticles: inventory.length,
              lowStock,
              totalTxs: transactions.length
            };
          }, [inventory, transactions]);

          const [aiTip, setAiTip] = useState('');
          const [aiLoading, setAiLoading] = useState(false);

          const handleGetAiTip = async () => {
            if (!GEMINI_API_KEY || GEMINI_API_KEY === "YOUR_GEMINI_API_KEY") {
              showToast("API Key is missing for AI feature. Update in code.", "error");
              return;
            }
            setAiLoading(true);
            try {
              const summary = `Inventory has ${stats.totalArticles} unique articles. Total pieces: ${stats.totalPieces}. ${stats.lowStock} items are low on stock. Recent activity: ${transactions.slice(0,5).map(t=>`${t.type} ${t.quantity} ${t.articleId}`).join(', ')}.`;
              const prompt = `You are an expert retail business analyst for 'Abaya House'. Based on this inventory summary: "${summary}", give 3 very short, actionable business tips in Roman Urdu. Format as a bulleted list. Keep it concise.`;

              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }]
                })
              });
              
              const data = await response.json();
              const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
              if (text) setAiTip(text);
              else throw new Error("No response");
            } catch (e) {
              console.error(e);
              showToast("Failed to fetch AI insights", "error");
            } finally {
              setAiLoading(false);
            }
          };

          return (
            <div className="space-y-6 animate-in fade-in duration-500">
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                {[
                  { label: 'Total Pieces', value: stats.totalPieces, color: 'text-indigo-500' },
                  { label: 'Total Articles', value: stats.totalArticles, color: 'text-emerald-500' },
                  { label: 'Low Stock Alerts', value: stats.lowStock, color: 'text-amber-500' },
                  { label: 'Total History Logs', value: stats.totalTxs, color: 'text-blue-500' },
                ].map((stat, i) => (
                  <Card key={i} className="p-6 flex flex-col justify-center">
                    <span className="text-sm font-medium text-slate-500 dark:text-slate-400">{stat.label}</span>
                    <span className={`text-3xl font-bold mt-2 ${stat.color}`}>{stat.value}</span>
                  </Card>
                ))}
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <Card className="col-span-2 p-6">
                  <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                    <History className="w-5 h-5 text-indigo-500" /> Recent Operations
                  </h2>
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm text-left">
                      <thead className="text-xs text-slate-500 uppercase bg-slate-50 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">
                        <tr>
                          <th className="px-4 py-3">Type</th>
                          <th className="px-4 py-3">Article</th>
                          <th className="px-4 py-3">Qty</th>
                          <th className="px-4 py-3">Date</th>
                          <th className="px-4 py-3">Remarks</th>
                        </tr>
                      </thead>
                      <tbody>
                        {transactions.slice(0, 6).map(tx => (
                          <tr key={tx.id} className="border-b border-slate-100 dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-800/50">
                            <td className="px-4 py-3">
                              <span className={`px-2 py-1 rounded-full text-xs font-semibold ${tx.type === 'IN' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400' : 'bg-orange-100 text-orange-700 dark:bg-orange-900/30 dark:text-orange-400'}`}>
                                {tx.type}
                              </span>
                            </td>
                            <td className="px-4 py-3 font-medium">{tx.articleId}</td>
                            <td className="px-4 py-3">{tx.quantity}</td>
                            <td className="px-4 py-3 text-slate-500">{formatDate(tx.date)}</td>
                            <td className="px-4 py-3 truncate max-w-[150px]">{tx.shopName || tx.remarks}</td>
                          </tr>
                        ))}
                        {transactions.length === 0 && (
                          <tr><td colSpan="5" className="px-4 py-8 text-center text-slate-500">No recent activity</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </Card>

                <div className="space-y-6">
                  <Card className="p-6 bg-gradient-to-br from-indigo-50 to-purple-50 dark:from-indigo-900/20 dark:to-purple-900/20 border-indigo-100 dark:border-indigo-800/50">
                    <h2 className="text-lg font-semibold mb-4 flex items-center gap-2 text-indigo-700 dark:text-indigo-300">
                      <Sparkles className="w-5 h-5" /> AI Business Analyst
                    </h2>
                    <p className="text-sm text-slate-600 dark:text-slate-400 mb-4">
                      Get intelligent insights based on your current stock levels and recent activity.
                    </p>
                    <Button onClick={handleGetAiTip} disabled={aiLoading} className="w-full mb-4 shadow-sm">
                      {aiLoading ? 'Analyzing...' : 'Generate Tips (Roman Urdu)'}
                    </Button>
                    {aiTip && (
                      <div className="mt-4 p-4 bg-white/60 dark:bg-slate-800/60 rounded-lg text-sm border border-indigo-100 dark:border-indigo-800 whitespace-pre-wrap leading-relaxed shadow-inner text-slate-800 dark:text-slate-200">
                        {aiTip}
                      </div>
                    )}
                  </Card>

                  {loggedInUser?.role === 'admin' && (
                    <Card className="p-6 border-red-200 dark:border-red-900/50 bg-red-50/50 dark:bg-red-900/10">
                      <h2 className="text-lg font-semibold mb-2 text-red-700 dark:text-red-400">Danger Zone</h2>
                      <p className="text-sm text-slate-600 dark:text-slate-400 mb-4">Permanently delete all inventory and history logs.</p>
                      <Button variant="danger" icon={Trash2} onClick={onWipe} className="w-full shadow-sm shadow-red-500/20">Wipe All Data</Button>
                    </Card>
                  )}
                </div>
              </div>
            </div>
          );
        };

        const AddStockView = ({ onAdd, showToast }) => {
          const [form, setForm] = useState({ articleId: '', quantity: '', style: '', target: '' });
          const [csvFile, setCsvFile] = useState(null);
          const [isProcessing, setIsProcessing] = useState(false);

          const handleSubmit = async (e) => {
            e.preventDefault();
            setIsProcessing(true);
            const success = await onAdd(form.articleId, form.quantity, form.target, form.style);
            if (success) {
              setForm({ articleId: '', quantity: '', style: '', target: '' });
              showToast("Stock added successfully");
            }
            setIsProcessing(false);
          };

          const handleCSVUpload = async () => {
            if (!csvFile) return;
            setIsProcessing(true);
            try {
              const text = await csvFile.text();
              const data = parseBasicCSV(text);
              if (data.length === 0) throw new Error("CSV file khaali hai ya format theek nahi.");
              
              let successCount = 0;
              for (const row of data) {
                const idKey = Object.keys(row).find(k => k.includes('article') || k.includes('id'));
                const qtyKey = Object.keys(row).find(k => k.includes('qty') || k.includes('quantity'));
                const styleKey = Object.keys(row).find(k => k.includes('style') || k.includes('color'));
                const remarksKey = Object.keys(row).find(k => k.includes('remark') || k.includes('target') || k.includes('source'));

                const id = idKey ? row[idKey] : null;
                const qty = qtyKey ? parseInt(row[qtyKey]) : null;

                if (id && qty && !isNaN(qty) && qty > 0) {
                  await onAdd(id, qty, (remarksKey ? row[remarksKey] : 'CSV Bulk Upload'), (styleKey ? row[styleKey] : ''));
                  successCount++;
                }
              }
              
              if (successCount === 0) throw new Error("Koi valid item nahi mila. Headers check karein (ArticleID, Quantity).");
              
              showToast(`Bulk upload complete. ${successCount} items add ho gaye.`);
              setCsvFile(null);
              document.getElementById('csv-upload').value = '';
            } catch (e) {
              console.error(e);
              showToast(e.message || "CSV upload mein masla aaya", "error");
            } finally {
              setIsProcessing(false);
            }
          };

          const downloadTemplate = () => {
            const csvContent = "data:text/csv;charset=utf-8,ArticleID,Quantity,Style,Remarks\nAB-001,50,Basic,New Arrival\n";
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "master_intake_template.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };

          return (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in fade-in slide-in-from-bottom-4 duration-300">
              <Card className="p-6">
                <h2 className="text-xl font-semibold mb-6 flex items-center gap-2"><PlusCircle className="w-5 h-5 text-indigo-500" /> Manual Intake Form</h2>
                <form onSubmit={handleSubmit} className="space-y-4">
                  <Input label="Article ID" value={form.articleId} onChange={e => setForm({...form, articleId: e.target.value.toUpperCase()})} placeholder="e.g. AB-1024" required className="uppercase-input" />
                  <Input label="Quantity" type="number" value={form.quantity} onChange={e => setForm({...form, quantity: e.target.value})} placeholder="0" required />
                  <Input label="Style / Color (Optional)" value={form.style} onChange={e => setForm({...form, style: e.target.value})} placeholder="e.g. Black XL" />
                  <Input label="Remarks / Source" value={form.target} onChange={e => setForm({...form, target: e.target.value})} placeholder="e.g. Factory Batch A" />
                  
                  <Button type="submit" disabled={isProcessing} className="w-full mt-4">
                    {isProcessing ? 'Processing...' : 'Add to Master Inventory'}
                  </Button>
                </form>
              </Card>

              <Card className="p-6">
                <h2 className="text-xl font-semibold mb-6 flex items-center gap-2"><Upload className="w-5 h-5 text-emerald-500" /> Bulk CSV Upload</h2>
                <div className="space-y-6">
                  <div className="p-4 bg-slate-50 dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700">
                    <p className="text-sm text-slate-600 dark:text-slate-400 mb-3">
                      Upload a CSV file to add multiple items at once. Please ensure the headers match the template perfectly.
                    </p>
                    <Button variant="outline" icon={Download} onClick={downloadTemplate} className="w-full text-sm">Download Template</Button>
                  </div>
                  
                  <div className="space-y-4 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl p-6 text-center hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors relative">
                     <input 
                      id="csv-upload"
                      type="file" 
                      accept=".csv" 
                      onChange={e => setCsvFile(e.target.files[0])}
                      className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                    />
                    <FileText className="w-10 h-10 text-slate-400 mx-auto mb-2" />
                    <p className="text-sm font-medium">
                      {csvFile ? csvFile.name : "Click or drag CSV file here"}
                    </p>
                  </div>

                  <Button 
                    onClick={handleCSVUpload} 
                    disabled={!csvFile || isProcessing} 
                    className="w-full bg-emerald-600 hover:bg-emerald-700 focus:ring-emerald-500"
                  >
                    {isProcessing ? 'Processing File...' : 'Process Bulk Upload'}
                  </Button>
                </div>
              </Card>
            </div>
          );
        };

        const ShopsView = ({ shops, inventory, onDispatch, deliveryNotes, showToast, onPrint }) => {
          const [selectedShop, setSelectedShop] = useState(null);

          if (selectedShop) {
            return <ShopDetailView shop={selectedShop} onBack={() => setSelectedShop(null)} inventory={inventory} onDispatch={onDispatch} deliveryNotes={deliveryNotes} showToast={showToast} onPrint={onPrint} />;
          }

          return (
            <div className="animate-in fade-in duration-300">
              <h2 className="text-xl font-semibold mb-6">Select a Shop/Destination</h2>
              <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
                {shops.map(shopDoc => (
                  <Card 
                    key={shopDoc.id} 
                    onClick={() => setSelectedShop(shopDoc.name)}
                    className="p-6 cursor-pointer hover:border-indigo-500 hover:shadow-md transition-all group relative overflow-hidden"
                  >
                    <div className="absolute top-0 right-0 w-16 h-16 bg-indigo-50 dark:bg-indigo-900/20 rounded-bl-full -z-0 group-hover:scale-110 transition-transform"></div>
                    <div className="relative z-10">
                      <Store className="w-8 h-8 text-indigo-500 mb-4" />
                      <h3 className="font-bold text-lg mb-1">{shopDoc.name}</h3>
                      <p className="text-xs text-slate-500 flex items-center mt-2 group-hover:text-indigo-500">
                        Manage Ledger <ChevronRight className="w-3 h-3 ml-1" />
                      </p>
                    </div>
                  </Card>
                ))}
                {shops.length === 0 && (
                  <div className="col-span-full p-6 text-center text-slate-500 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-xl">
                    No shops available. Please add shops from the Master Data tab.
                  </div>
                )}
              </div>
            </div>
          );
        };

        const ShopDetailView = ({ shop, onBack, inventory, onDispatch, deliveryNotes, showToast, onPrint }) => {
          const [dispatchMode, setDispatchMode] = useState('manual');
          const [dispatchItems, setDispatchItems] = useState([{ articleId: '', quantity: '' }]);
          const [csvFile, setCsvFile] = useState(null);
          const [remarks, setRemarks] = useState('');
          const [isProcessing, setIsProcessing] = useState(false);
          
          const shopDNs = useMemo(() => deliveryNotes.filter(dn => dn.shopName === shop), [deliveryNotes, shop]);

          const handleAddItemRow = () => setDispatchItems([...dispatchItems, { articleId: '', quantity: '' }]);
          const handleRemoveItemRow = (index) => {
            const newItems = [...dispatchItems];
            newItems.splice(index, 1);
            setDispatchItems(newItems);
          };
          const handleItemChange = (index, field, value) => {
            const newItems = [...dispatchItems];
            newItems[index][field] = value.toUpperCase();
            setDispatchItems(newItems);
          };

          const handleDispatchSubmit = async (e) => {
            e.preventDefault();
            
            let validItems = [];
            if (dispatchMode === 'manual') {
              validItems = dispatchItems.filter(i => i.articleId && i.quantity > 0);
              if (validItems.length === 0) return;
            } else {
              if (!csvFile) {
                showToast("Please upload a CSV file first", "error");
                return;
              }
              try {
                const text = await csvFile.text();
                const data = parseBasicCSV(text);
                if (data.length === 0) throw new Error("Empty or invalid CSV");
                
                for (const row of data) {
                  const id = row['articleid'] || row['article'] || row['id'];
                  const qty = parseInt(row['quantity'] || row['qty']);
                  if (id && qty > 0) {
                    validItems.push({ articleId: id.toUpperCase(), quantity: qty });
                  }
                }
                if (validItems.length === 0) throw new Error("No valid items found in CSV");
              } catch (err) {
                showToast(err.message, "error");
                return;
              }
            }
            
            setIsProcessing(true);
            const success = await onDispatch(shop, validItems, remarks || (dispatchMode === 'csv' ? 'Bulk CSV Dispatch' : ''));
            if (success) {
              if (dispatchMode === 'manual') {
                setDispatchItems([{ articleId: '', quantity: '' }]);
              } else {
                setCsvFile(null);
                document.getElementById('dispatch-csv-upload').value = '';
              }
              setRemarks('');
            }
            setIsProcessing(false);
          };

          const downloadDispatchTemplate = () => {
            const csvContent = "data:text/csv;charset=utf-8,ArticleID,Quantity\nAB-001,5\nAB-002,10\n";
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `dispatch_template_${shop.replace(/\s+/g, '_').toLowerCase()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };

          return (
            <div className="space-y-6 animate-in slide-in-from-right-8 duration-300">
              <div className="flex items-center gap-4 mb-4">
                <Button variant="outline" onClick={onBack} className="px-3">← Back to Shops</Button>
                <h2 className="text-2xl font-bold flex items-center gap-2">
                  <Store className="w-6 h-6 text-indigo-500" /> {shop} Ledger
                </h2>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <Card className="p-6">
                  <div className="flex justify-between items-center mb-4 border-b border-slate-200 dark:border-slate-700 pb-2">
                    <h3 className="text-lg font-semibold">New Dispatch (Generate DN)</h3>
                    <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-lg">
                      <button type="button" onClick={() => setDispatchMode('manual')} className={`px-3 py-1 text-sm font-medium rounded-md transition-colors ${dispatchMode === 'manual' ? 'bg-white dark:bg-slate-700 shadow-sm text-indigo-600 dark:text-indigo-400' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Manual</button>
                      <button type="button" onClick={() => setDispatchMode('csv')} className={`px-3 py-1 text-sm font-medium rounded-md transition-colors ${dispatchMode === 'csv' ? 'bg-white dark:bg-slate-700 shadow-sm text-indigo-600 dark:text-indigo-400' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>CSV Upload</button>
                    </div>
                  </div>
                  
                  <form onSubmit={handleDispatchSubmit} className="space-y-4">
                    {dispatchMode === 'manual' ? (
                      <>
                        <div className="space-y-3 max-h-[400px] overflow-y-auto pr-2">
                          {dispatchItems.map((item, index) => (
                            <div key={index} className="flex gap-2 items-start bg-slate-50 dark:bg-slate-800/50 p-3 rounded-lg border border-slate-100 dark:border-slate-700">
                              <div className="flex-1">
                                 <label className="block text-xs font-medium text-slate-500 mb-1">Article ID</label>
                                 <input 
                                  list={`inv-list-${shop}`}
                                  value={item.articleId} 
                                  onChange={(e) => handleItemChange(index, 'articleId', e.target.value)}
                                  placeholder="Search..."
                                  required={dispatchMode === 'manual'}
                                  className="w-full px-3 py-2 text-sm border border-slate-300 rounded-md bg-white dark:bg-slate-900 dark:border-slate-600 focus:ring-2 focus:ring-indigo-500"
                                />
                                <datalist id={`inv-list-${shop}`}>
                                  {inventory.map(inv => <option key={inv.id} value={inv.articleId}>Qty: {inv.quantity}</option>)}
                                </datalist>
                              </div>
                              <div className="w-24">
                                 <label className="block text-xs font-medium text-slate-500 mb-1">Qty</label>
                                 <input 
                                  type="number"
                                  value={item.quantity} 
                                  onChange={(e) => handleItemChange(index, 'quantity', e.target.value)}
                                  placeholder="0"
                                  required={dispatchMode === 'manual'}
                                  className="w-full px-3 py-2 text-sm border border-slate-300 rounded-md bg-white dark:bg-slate-900 dark:border-slate-600 focus:ring-2 focus:ring-indigo-500"
                                />
                              </div>
                              {dispatchItems.length > 1 && (
                                <button type="button" onClick={() => handleRemoveItemRow(index)} className="mt-6 p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-md">
                                  <X className="w-4 h-4" />
                                </button>
                              )}
                            </div>
                          ))}
                        </div>
                        <Button variant="secondary" onClick={handleAddItemRow} className="w-full text-sm border-dashed border-2 border-slate-300 dark:border-slate-600">
                          + Add Another Article
                        </Button>
                      </>
                    ) : (
                      <div className="space-y-4">
                        <div className="p-3 bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-slate-200 dark:border-slate-700 text-sm">
                          <p className="text-slate-600 dark:text-slate-400 mb-2">Upload a CSV file to dispatch multiple items. Ensure headers are exactly <strong>ArticleID</strong> and <strong>Quantity</strong>.</p>
                          <Button type="button" variant="outline" onClick={downloadDispatchTemplate} className="w-full text-xs py-2 border-dashed">
                            <Download className="w-4 h-4 mr-2" /> Download Template
                          </Button>
                        </div>
                        <div className="border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-xl p-6 text-center hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors relative">
                           <input 
                            id="dispatch-csv-upload"
                            type="file" 
                            accept=".csv" 
                            onChange={e => setCsvFile(e.target.files[0])}
                            className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                          />
                          <FileText className="w-8 h-8 text-slate-400 mx-auto mb-2" />
                          <p className="text-sm font-medium text-slate-700 dark:text-slate-300">
                            {csvFile ? csvFile.name : "Click or drag CSV file here"}
                          </p>
                        </div>
                      </div>
                    )}
                    
                    <Input label="General Remarks (Optional)" value={remarks} onChange={e => setRemarks(e.target.value)} placeholder={dispatchMode === 'csv' ? "e.g. Bulk Dispatch from Warehouse" : "e.g. Urgent request"} />
                    
                    <Button type="submit" disabled={isProcessing || (dispatchMode === 'csv' && !csvFile)} className="w-full mt-4 h-12 text-lg font-bold">
                      {isProcessing ? 'Saving...' : 'Save Delivery Note'}
                    </Button>
                  </form>
                </Card>

                <Card className="p-6 flex flex-col">
                  <h3 className="text-lg font-semibold mb-4 border-b border-slate-200 dark:border-slate-700 pb-2">Delivery Note History</h3>
                  <div className="flex-1 overflow-y-auto max-h-[500px]">
                     {shopDNs.length === 0 ? (
                       <div className="h-full flex items-center justify-center text-slate-400 text-sm">No DNs generated for this shop yet.</div>
                     ) : (
                       <div className="space-y-3">
                         {shopDNs.map(dn => (
                           <div key={dn.id} className="p-4 rounded-lg border border-slate-200 dark:border-slate-700 hover:border-indigo-300 dark:hover:border-indigo-700 transition-colors bg-slate-50 dark:bg-slate-800/30 flex justify-between items-center">
                             <div>
                               <h4 className="font-bold text-indigo-600 dark:text-indigo-400">{dn.dnNumber}</h4>
                               <p className="text-xs text-slate-500 mt-1">{formatDate(dn.date)} • {dn.totalPieces} pieces</p>
                             </div>
                             <div className="flex items-center gap-3">
                               <span className="text-xs font-medium px-2 py-1 bg-slate-200 dark:bg-slate-700 rounded text-slate-600 dark:text-slate-300">
                                 {dn.items.length} Articles
                               </span>
                               <button onClick={() => onPrint(dn)} className="flex items-center gap-1 text-xs font-medium text-indigo-600 bg-indigo-100 hover:bg-indigo-200 dark:text-indigo-300 dark:bg-indigo-900/50 dark:hover:bg-indigo-900 px-3 py-1.5 rounded transition-colors">
                                 <Printer className="w-3.5 h-3.5" /> Print / PDF
                               </button>
                             </div>
                           </div>
                         ))}
                       </div>
                     )}
                  </div>
                </Card>
              </div>
            </div>
          );
        };

        const InventoryView = ({ inventory, getCollectionRef, showToast }) => {
          const [searchTerm, setSearchTerm] = useState('');
          const [editModal, setEditModal] = useState({ isOpen: false, item: null });
          const [editQty, setEditQty] = useState('');

          const filtered = useMemo(() => {
            return inventory.filter(i => 
              i.articleId.toLowerCase().includes(searchTerm.toLowerCase()) || 
              (i.style && i.style.toLowerCase().includes(searchTerm.toLowerCase()))
            ).sort((a, b) => a.articleId.localeCompare(b.articleId));
          }, [inventory, searchTerm]);

          const handleDelete = async (id) => {
            if (!window.confirm("Delete this article from master inventory?")) return;
            try {
              await deleteDoc(doc(getCollectionRef(COLLECTIONS.INVENTORY), id));
              showToast("Article deleted");
            } catch (e) {
              showToast("Error deleting", "error");
            }
          };

          const handleUpdate = async () => {
            if (!editModal.item || editQty === '') return;
            try {
              await updateDoc(doc(getCollectionRef(COLLECTIONS.INVENTORY), editModal.item.id), {
                quantity: parseInt(editQty),
                lastUpdated: Date.now()
              });
              showToast("Quantity updated");
              setEditModal({ isOpen: false, item: null });
            } catch (e) {
              showToast("Error updating", "error");
            }
          };

          return (
            <div className="animate-in fade-in duration-300">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 className="text-xl font-semibold">Current Stock Table</h2>
                <div className="w-full md:w-64">
                  <Input value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="Search articles..." className="mb-0" />
                </div>
              </div>

              <Card className="overflow-hidden">
                <div className="overflow-x-auto max-h-[70vh]">
                  <table className="w-full text-sm text-left">
                    <thead className="text-xs text-slate-500 uppercase bg-slate-50 dark:bg-slate-800 sticky top-0 z-10 shadow-sm">
                      <tr>
                        <th className="px-6 py-4">Article ID</th>
                        <th className="px-6 py-4">Style / Color</th>
                        <th className="px-6 py-4 text-center">Quantity</th>
                        <th className="px-6 py-4">Last Intake/Target</th>
                        <th className="px-6 py-4 text-right">Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.map(item => (
                        <tr key={item.id} className="border-b border-slate-100 dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-800/50">
                          <td className="px-6 py-4 font-bold text-slate-900 dark:text-slate-100">{item.articleId}</td>
                          <td className="px-6 py-4">{item.style || '-'}</td>
                          <td className="px-6 py-4 text-center">
                            <span className={`px-3 py-1 rounded-full font-bold ${item.quantity < 10 ? 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400' : 'bg-slate-100 text-slate-700 dark:bg-slate-700 dark:text-slate-300'}`}>
                              {item.quantity}
                            </span>
                          </td>
                          <td className="px-6 py-4 text-slate-500">{item.target || '-'}</td>
                          <td className="px-6 py-4 text-right flex justify-end gap-2">
                            <button onClick={() => { setEditModal({ isOpen: true, item }); setEditQty(item.quantity.toString()); }} className="p-2 text-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 rounded-lg transition-colors">
                              <Edit className="w-4 h-4" />
                            </button>
                            <button onClick={() => handleDelete(item.id)} className="p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg transition-colors">
                              <Trash2 className="w-4 h-4" />
                            </button>
                          </td>
                        </tr>
                      ))}
                      {filtered.length === 0 && (
                        <tr><td colSpan="5" className="px-6 py-12 text-center text-slate-500 text-lg">No items found in inventory.</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </Card>

              <Modal 
                isOpen={editModal.isOpen} 
                onClose={() => setEditModal({ isOpen: false, item: null })}
                title={`Edit Stock: ${editModal.item?.articleId}`}
                footer={<><Button variant="outline" onClick={() => setEditModal({ isOpen: false, item: null })}>Cancel</Button><Button onClick={handleUpdate}>Save Changes</Button></>}
              >
                <div className="py-4">
                  <Input label="New Quantity" type="number" value={editQty} onChange={e => setEditQty(e.target.value)} />
                </div>
              </Modal>
            </div>
          );
        };

        const HistoryView = ({ transactions }) => {
          const [filter, setFilter] = useState('ALL');
          
          const filteredTxs = useMemo(() => {
            if (filter === 'ALL') return transactions;
            return transactions.filter(t => t.type === filter);
          }, [transactions, filter]);

          return (
            <div className="animate-in fade-in duration-300">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-xl font-semibold">Comprehensive Ledger</h2>
                <div className="flex gap-2 bg-slate-200 dark:bg-slate-800 p-1 rounded-lg">
                  {['ALL', 'IN', 'OUT'].map(f => (
                    <button 
                      key={f} 
                      onClick={() => setFilter(f)}
                      className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors ${filter === f ? 'bg-white dark:bg-slate-600 shadow-sm text-indigo-600 dark:text-indigo-300' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-300 dark:hover:bg-slate-700'}`}
                    >
                      {f}
                    </button>
                  ))}
                </div>
              </div>

              <Card className="overflow-hidden">
                <div className="overflow-x-auto max-h-[75vh]">
                  <table className="w-full text-sm text-left">
                     <thead className="text-xs text-slate-500 uppercase bg-slate-50 dark:bg-slate-800 sticky top-0 z-10 shadow-sm">
                      <tr>
                        <th className="px-6 py-4">Date & Time</th>
                        <th className="px-6 py-4">Type</th>
                        <th className="px-6 py-4">Article</th>
                        <th className="px-6 py-4 text-center">Qty</th>
                        <th className="px-6 py-4">Destination / Remarks</th>
                        <th className="px-6 py-4 text-right">Reference DN</th>
                      </tr>
                    </thead>
                    <tbody className="font-mono text-[13px]">
                      {filteredTxs.map(tx => (
                        <tr key={tx.id} className="border-b border-slate-100 dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-800/50">
                          <td className="px-6 py-3 whitespace-nowrap text-slate-500 font-sans">{formatDate(tx.date)}</td>
                          <td className="px-6 py-3">
                            <span className={`px-2 py-1 rounded font-bold font-sans text-xs ${tx.type === 'IN' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400' : 'bg-orange-100 text-orange-700 dark:bg-orange-900/30 dark:text-orange-400'}`}>
                              {tx.type}
                            </span>
                          </td>
                          <td className="px-6 py-3 font-bold">{tx.articleId}</td>
                          <td className="px-6 py-3 text-center">{tx.type === 'IN' ? '+' : '-'}{tx.quantity}</td>
                          <td className="px-6 py-3 font-sans truncate max-w-[200px]">{tx.shopName || tx.remarks || '-'}</td>
                          <td className="px-6 py-3 text-right text-indigo-500">{tx.dnNumber || '-'}</td>
                        </tr>
                      ))}
                      {filteredTxs.length === 0 && (
                        <tr><td colSpan="6" className="px-6 py-12 text-center text-slate-500 text-lg font-sans">No transaction history found.</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </Card>
            </div>
          );
        };

        const MasterDataView = ({ appShops, appUsers, getCollectionRef, showToast }) => {
          const [newShop, setNewShop] = useState('');
          const [newUser, setNewUser] = useState({ username: '', password: '', role: 'staff' });

          const handleAddShop = async (e) => {
            e.preventDefault();
            if(!newShop.trim()) return;
            try {
              await setDoc(doc(getCollectionRef(COLLECTIONS.SHOPS), newShop.trim().toUpperCase()), {
                name: newShop.trim().toUpperCase(),
                createdAt: Date.now()
              });
              setNewShop('');
              showToast("New shop created!");
            } catch (error) {
              showToast("Error creating shop", "error");
            }
          };

          const handleDeleteShop = async (id) => {
            if(!window.confirm("Delete this shop? Delivery Notes history will remain intact, but shop will be removed from lists.")) return;
            await deleteDoc(doc(getCollectionRef(COLLECTIONS.SHOPS), id));
          };

          const handleAddUser = async (e) => {
            e.preventDefault();
            if(!newUser.username || !newUser.password) return;
            try {
              await setDoc(doc(getCollectionRef(COLLECTIONS.USERS), newUser.username.toLowerCase()), {
                username: newUser.username.toLowerCase(),
                password: newUser.password,
                role: newUser.role,
                createdAt: Date.now()
              });
              setNewUser({ username: '', password: '', role: 'staff' });
              showToast("New user created!");
            } catch (error) {
              showToast("Error creating user", "error");
            }
          };

          const handleDeleteUser = async (id) => {
            if(!window.confirm("Delete this user? They will lose access to the portal.")) return;
            await deleteDoc(doc(getCollectionRef(COLLECTIONS.USERS), id));
          };

          return (
             <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 animate-in fade-in duration-300">
               <Card className="p-6">
                 <h2 className="text-xl font-semibold mb-6 flex items-center gap-2"><Store className="w-5 h-5 text-indigo-500" /> Manage Shops</h2>
                 <form onSubmit={handleAddShop} className="flex gap-2 mb-6">
                   <div className="flex-1">
                     <Input value={newShop} onChange={e => setNewShop(e.target.value)} placeholder="New Shop Name..." className="mb-0" required />
                   </div>
                   <Button type="submit">Add Shop</Button>
                 </form>
                 <div className="space-y-2 max-h-[400px] overflow-y-auto pr-2">
                   {appShops.map(shop => (
                     <div key={shop.id} className="flex justify-between items-center p-3 bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-slate-200 dark:border-slate-700">
                       <span className="font-medium">{shop.name}</span>
                       <button onClick={() => handleDeleteShop(shop.id)} className="text-red-500 hover:text-red-700 p-1"><Trash2 className="w-4 h-4" /></button>
                     </div>
                   ))}
                   {appShops.length === 0 && <p className="text-sm text-slate-500">No custom shops added yet.</p>}
                 </div>
               </Card>

               <Card className="p-6">
                 <h2 className="text-xl font-semibold mb-6 flex items-center gap-2"><UserPlus className="w-5 h-5 text-emerald-500" /> Manage Users & Roles</h2>
                 <form onSubmit={handleAddUser} className="space-y-4 mb-6 border-b border-slate-200 dark:border-slate-700 pb-6">
                   <Input label="Username" value={newUser.username} onChange={e => setNewUser({...newUser, username: e.target.value})} placeholder="staff_01" required />
                   <Input label="Password" type="text" value={newUser.password} onChange={e => setNewUser({...newUser, password: e.target.value})} required />
                   <div className="mb-4">
                     <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Access Role</label>
                     <select value={newUser.role} onChange={e => setNewUser({...newUser, role: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:bg-slate-800 dark:border-slate-600 dark:text-white">
                       <option value="staff">Staff (Limited Access)</option>
                       <option value="admin">Admin (Full Access)</option>
                     </select>
                     <p className="text-xs text-slate-500 mt-2">
                       * Admin can access Master Data and Danger Zone. Staff cannot.
                     </p>
                   </div>
                   <Button type="submit" className="w-full">Create User</Button>
                 </form>
                 <div className="space-y-2 max-h-[300px] overflow-y-auto pr-2">
                   {appUsers.map(user => (
                     <div key={user.id} className="flex justify-between items-center p-3 bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-slate-200 dark:border-slate-700">
                       <div>
                         <span className="font-bold block">{user.username}</span>
                         <span className={`text-[10px] font-bold px-2 py-0.5 rounded uppercase ${user.role === 'admin' ? 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900 dark:text-indigo-300' : 'bg-slate-200 text-slate-700 dark:bg-slate-700 dark:text-slate-300'}`}>
                           {user.role}
                         </span>
                       </div>
                       <button onClick={() => handleDeleteUser(user.id)} className="text-red-500 hover:text-red-700 p-1"><Trash2 className="w-4 h-4" /></button>
                     </div>
                   ))}
                   {appUsers.length === 0 && <p className="text-sm text-slate-500">Only fallback admin exists. Create users here.</p>}
                 </div>
               </Card>
             </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
