<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management App for Abaya House</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* FIXED: Added min-height 100vh to ensure body always covers the full screen, removing white bar at bottom */
        body { margin: 0; padding: 0; background-color: #f8fafc; transition: background-color 0.3s; min-height: 100vh; }
        html.dark body { background-color: #0f172a; min-height: 100vh; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        .uppercase-input { text-transform: uppercase; }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px rgba(99, 102, 241, 0.5); }
            50% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.8); }
        }
        .animate-glow { animation: glow 2s infinite; }

        @keyframes bgPan {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-bg-pan { animation: bgPan 40s ease-in-out infinite; background-size: 200% 200%; }

        @keyframes particleUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: particleUp 10s infinite linear;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes scan {
            0%, 100% { top: 0%; opacity: 0; }
            10%, 90% { opacity: 1; }
            50% { top: 100%; }
        }

        /* 3D Premium Theme */
        .theme-3d .rounded-xl, .theme-3d .rounded-2xl {
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.15), 0 8px 10px -6px rgba(0, 0, 0, 0.1), inset 0 2px 2px rgba(255, 255, 255, 0.8) !important;
            border-top: 1px solid rgba(255,255,255,0.8) !important;
            border-bottom: 2px solid rgba(0,0,0,0.1) !important;
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }
        .dark .theme-3d .rounded-xl, .dark .theme-3d .rounded-2xl {
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.1) !important;
            border-top: 1px solid rgba(255,255,255,0.1) !important;
            border-bottom: 2px solid rgba(0,0,0,0.4) !important;
        }
        .theme-3d button.bg-indigo-600 {
            box-shadow: 0 4px 0 #4338ca, 0 8px 15px rgba(0,0,0,0.2) !important;
            transform: translateY(-2px);
            border: none !important;
        }
        .theme-3d button.bg-indigo-600:active {
            box-shadow: 0 0px 0 #4338ca, 0 2px 5px rgba(0,0,0,0.2) !important;
            transform: translateY(2px);
        }

        /* Glassmorphism Theme */
        .theme-glass {
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') !important;
            background-size: cover !important;
            background-position: center !important;
            background-attachment: fixed !important;
        }
        .dark.theme-glass {
            background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2560&auto=format&fit=crop') !important;
        }
        .theme-glass .bg-white, .theme-glass .bg-slate-900, .theme-glass .bg-slate-800, .theme-glass .bg-slate-50 {
            background-color: transparent !important;
        }
        .theme-glass .rounded-xl, .theme-glass .rounded-2xl {
            background: rgba(255, 255, 255, 0.2) !important;
            backdrop-filter: blur(16px) !important;
            -webkit-backdrop-filter: blur(16px) !important;
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15) !important;
        }
        .dark .theme-glass .rounded-xl, .dark .theme-glass .rounded-2xl {
            background: rgba(15, 23, 42, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3) !important;
        }
        .theme-glass header {
            background: rgba(255, 255, 255, 0.15) !important;
            backdrop-filter: blur(24px) !important;
            border-bottom: 1px solid rgba(255,255,255,0.3) !important;
        }
        .dark .theme-glass header {
            background: rgba(15, 23, 42, 0.5) !important;
            border-bottom: 1px solid rgba(255,255,255,0.1) !important;
        }
        .theme-glass aside, .theme-glass .w-64 { 
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(24px) !important;
            border-right: 1px solid rgba(255,255,255,0.3) !important;
        }
        .dark .theme-glass aside, .dark .theme-glass .w-64 {
            background: rgba(15, 23, 42, 0.5) !important;
            border-right: 1px solid rgba(255,255,255,0.1) !important;
        }
        .theme-glass input, .theme-glass select {
            background: rgba(255,255,255,0.4) !important;
            border: 1px solid rgba(255,255,255,0.6) !important;
            color: #1e293b !important;
        }
        .dark .theme-glass input, .dark .theme-glass select {
            background: rgba(0,0,0,0.3) !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            color: white !important;
        }
        .theme-glass table th {
            background: rgba(255,255,255,0.3) !important;
            backdrop-filter: blur(10px);
        }
        .dark .theme-glass table th {
            background: rgba(0,0,0,0.4) !important;
        }
        .theme-glass table tr {
            border-bottom: 1px solid rgba(255,255,255,0.2) !important;
        }
        .dark .theme-glass table tr {
            border-bottom: 1px solid rgba(255,255,255,0.05) !important;
        }

        @media print {
            body, html { background: white !important; margin: 0; padding: 0; height: auto; }
            .print-hide { display: none !important; }
            @page { margin: 15mm; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import { 
          LayoutDashboard, PlusCircle, Store, Package, History, 
          LogOut, Moon, Sun, Trash2, Edit, Printer, FileText, 
          Upload, Download, AlertTriangle, Sparkles, X, ChevronRight, Check,
          Settings, UserPlus, Shield, Lock, MessageSquare, BellRing, Fingerprint, Database,
          PieChart as LucidePieChart, BarChart3, ScanBarcode, QrCode, Palette, Layers
        } from 'https://esm.sh/lucide-react@0.344.0';

        import { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, Legend } from 'https://esm.sh/recharts@2.12.0?deps=react@18,react-dom@18';
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, getDoc, deleteDoc, updateDoc, query, orderBy, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // ============================================================================
        // 🔴 FIREBASE CONFIGURATION 🔴
        // ============================================================================
        const fallbackConfig = {
            apiKey: "AIzaSyAj6yKpU9sD-Wmiftp6A68DzAWAZ2mamx4",
            authDomain: "reesha-abaya.firebaseapp.com",
            databaseURL: "https://reesha-abaya-default-rtdb.firebaseio.com",
            projectId: "reesha-abaya",
            storageBucket: "reesha-abaya.firebasestorage.app",
            messagingSenderId: "291827178527",
            appId: "1:291827178527:web:ca2f84956e3b9a48c4492a" // <-- BHAI YAHAN APNA APP ID LIKHNA HAI!
        };
        const GEMINI_API_KEY = "AIzaSyAIxAMwmLUh7bW3pSq4G2-uDe3Ac3K-jZc"; // AI Tips ke liye yahan key dalein
        // ============================================================================

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'abaya-house-mgr-v1';
        const sanitizedAppId = appId.replace(/\//g, '_');

        let app, auth, db;
        try {
            const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
            const config = configStr ? JSON.parse(configStr) : fallbackConfig;
            
            if(config.appId !== "YAHAN_APNA_APP_ID_DALEIN" && config.apiKey !== "YOUR_API_KEY") {
                app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);
            }
        } catch (e) {
            console.error("Firebase initialization failed", e);
        }

        const COLLECTIONS = {
          INVENTORY: 'inventory',
          TRANSACTIONS: 'transactions',
          DELIVERY_NOTES: 'deliveryNotes',
          SHOPS: 'shops',
          USERS: 'users'
        };

        // --- UI Components ---
        const Card = ({ children, className = "", onClick }) => (
          <div onClick={onClick} className={`bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden transition-all duration-300 hover:shadow-[0_8px_30px_rgb(0,0,0,0.12)] dark:hover:shadow-[0_8px_30px_rgba(99,102,241,0.15)] hover:-translate-y-1 ${className}`}>
            {children}
          </div>
        );

        const Button = ({ children, onClick, variant = 'primary', className = "", icon: Icon, disabled = false, type="button" }) => {
          const baseStyle = "inline-flex items-center justify-center px-4 py-2 text-sm font-medium rounded-lg transition-all duration-200 transform active:scale-95 focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed";
          const variants = {
            primary: "bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-500 shadow-md hover:shadow-lg",
            secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200 dark:bg-slate-700 dark:text-slate-200 dark:hover:bg-slate-600 shadow-sm",
            danger: "bg-red-600 text-white hover:bg-red-700 focus:ring-red-500 shadow-md hover:shadow-lg",
            outline: "border border-slate-300 text-slate-700 hover:bg-slate-50 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-800"
          };
          
          return (
            <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
              {Icon && <Icon className="w-4 h-4 mr-2" />}
              {children}
            </button>
          );
        };

        const Input = ({ label, type = "text", value, onChange, placeholder, required = false, className="" }) => (
          <div className={`mb-4 ${className}`}>
            {label && <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">{label} {required && <span className="text-red-500">*</span>}</label>}
            <input
              type={type}
              value={value}
              onChange={onChange}
              required={required}
              placeholder={placeholder}
              className="w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:bg-slate-800 dark:border-slate-600 dark:text-white"
            />
          </div>
        );

        const Modal = ({ isOpen, onClose, title, children, footer }) => {
          if (!isOpen) return null;
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm animate-in fade-in duration-200">
              <div className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-lg overflow-hidden animate-in zoom-in-95 duration-300">
                <div className="flex justify-between items-center p-4 border-b border-slate-200 dark:border-slate-700">
                  <h3 className="text-lg font-semibold text-slate-900 dark:text-white">{title}</h3>
                  <button onClick={onClose} className="text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition-transform hover:rotate-90">
                    <X className="w-5 h-5" />
                  </button>
                </div>
                <div className="p-4 max-h-[70vh] overflow-y-auto">
                  {children}
                </div>
                {footer && (
                  <div className="p-4 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-end gap-2">
                    {footer}
                  </div>
                )}
              </div>
            </div>
          );
        };

        const generateId = () => Math.random().toString(36).substring(2, 9) + Date.now().toString(36);
        const formatDate = (timestamp) => {
          if (!timestamp) return 'N/A';
          const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
          return new Intl.DateTimeFormat('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }).format(date);
        };

        const parseBasicCSV = (csvText) => {
          const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
          if (lines.length < 2) return [];
          const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/["']/g, ''));
          const data = [];
          for (let i = 1; i < lines.length; i++) {
            const values = lines[i].split(',');
            const entry = {};
            headers.forEach((h, index) => {
              entry[h] = values[index] ? values[index].trim().replace(/["']/g, '') : '';
            });
            data.push(entry);
          }
          return data;
        };

        // --- Barcode Scanner Modal Component ---
        const BarcodeScannerModal = ({ isOpen, onClose, onScan }) => {
          useEffect(() => {
            if (!isOpen) return;
            let barcode = '';
            let lastKeyTime = Date.now();

            const handleKeyDown = (e) => {
              const currentTime = Date.now();
              if (currentTime - lastKeyTime > 100) {
                barcode = '';
              }
              lastKeyTime = currentTime;

              if (e.key === 'Enter') {
                e.preventDefault();
                if (barcode.length > 0) {
                  onScan(barcode.toUpperCase());
                  onClose();
                }
              } else if (e.key.length === 1) {
                barcode += e.key;
              }
            };

            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [isOpen, onScan, onClose]);

          if (!isOpen) return null;

          return (
            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm animate-in fade-in duration-200">
              <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl p-8 max-w-sm w-full text-center border border-indigo-500/30 flex flex-col items-center relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-1 bg-indigo-500 shadow-[0_0_15px_#6366f1] animate-[scan_2s_ease-in-out_infinite]"></div>
                <ScanBarcode className="w-20 h-20 text-indigo-500 mb-6 animate-pulse" />
                <h3 className="text-2xl font-extrabold text-slate-800 dark:text-white mb-2">Scanner Active</h3>
                <p className="text-slate-500 dark:text-slate-400 mb-8 font-medium">Use your hardware barcode scanner now to scan the item, or type rapidly.</p>
                <Button variant="outline" onClick={onClose} className="w-full rounded-xl">Cancel Scanning</Button>
              </div>
            </div>
          );
        };

        // --- Main App Component ---
        function App() {
          const [isAppAuthenticated, setIsAppAuthenticated] = useState(() => {
            return !!localStorage.getItem('abaya_logged_in_user');
          });
          const [loggedInUser, setLoggedInUser] = useState(() => {
            const savedUser = localStorage.getItem('abaya_logged_in_user');
            return savedUser ? JSON.parse(savedUser) : null;
          });
          
          const [firebaseUser, setFirebaseUser] = useState(null);
          
          const [theme, setTheme] = useState(() => {
            if (typeof window !== 'undefined' && localStorage) {
               return localStorage.getItem('abaya_theme') || 'dark';
            }
            return 'dark';
          });
          
          const [uiTheme, setUiTheme] = useState(() => {
            if (typeof window !== 'undefined' && localStorage) {
               return localStorage.getItem('abaya_ui_theme') || 'default';
            }
            return 'default';
          });

          const [activeTab, setActiveTab] = useState('dashboard');
          
          const [inventory, setInventory] = useState([]);
          const [transactions, setTransactions] = useState([]);
          const [deliveryNotes, setDeliveryNotes] = useState([]);
          const [appShops, setAppShops] = useState([]);
          const [appUsers, setAppUsers] = useState([]);
          const [loading, setLoading] = useState(true);
          
          const [toast, setToast] = useState(null);
          const [printData, setPrintData] = useState(null); 
          const [printReport, setPrintReport] = useState(null); 
          const [dbError, setDbError] = useState(null); 
          
          const showToast = (message, type = 'success') => {
            setToast({ message, type });
            setTimeout(() => setToast(null), 3000);
          };

          const hasAccess = (tabId) => {
            if (loggedInUser?.role === 'admin') return true;
            if (!loggedInUser?.permissions) return true;
            return loggedInUser.permissions[tabId];
          };

          useEffect(() => {
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                if (typeof window !== 'undefined' && localStorage) localStorage.setItem('abaya_theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark');
                if (typeof window !== 'undefined' && localStorage) localStorage.setItem('abaya_theme', 'light');
            }
          }, [theme]);

          useEffect(() => {
            if (typeof window !== 'undefined' && localStorage) {
               localStorage.setItem('abaya_ui_theme', uiTheme);
            }
          }, [uiTheme]);

          useEffect(() => {
            const initAuth = async () => {
              if (!auth) {
                setDbError("Firebase App Initialize nahi hui. Kya aapne sahi se Config paste kiya tha aur apna appId daala hai?");
                return;
              }
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (error) {
                console.error("Auth error", error);
                setDbError("⚠️ FIREBASE ERROR: Aapki app database se connect nahi ho rahi!\n\nHal (Fix): Apne Firebase Console mein jayen -> Build -> Authentication -> Sign-in method -> wahan list mein 'Anonymous' ko dhoond kar Enable karein aur Save karein!");
              }
            };
            initAuth();

            if (auth) {
              const unsub = onAuthStateChanged(auth, (user) => {
                setFirebaseUser(user);
              });
              return () => unsub();
            }
          }, []);

          useEffect(() => {
            if (!firebaseUser || !db) return;

            const getCollectionRef = (colName) => collection(db, 'artifacts', sanitizedAppId, 'public', 'data', colName);

            setLoading(true);
            
            const handleDbError = (err) => {
                console.error("DB Error", err);
                setDbError("⚠️ FIREBASE RULES ERROR: Data save/read nahi ho raha!\n\nHal (Fix): Firebase Console -> Firestore Database -> Rules tab mein jayen aur wahan 'allow read, write: if true;' likh kar Publish karein.");
            };

            const unsubInventory = onSnapshot(getCollectionRef(COLLECTIONS.INVENTORY), (snapshot) => {
              setInventory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            }, handleDbError);

            const unsubTransactions = onSnapshot(getCollectionRef(COLLECTIONS.TRANSACTIONS), (snapshot) => {
              const txs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              txs.sort((a, b) => b.date - a.date);
              setTransactions(txs);
            }, handleDbError);

            const unsubDN = onSnapshot(getCollectionRef(COLLECTIONS.DELIVERY_NOTES), (snapshot) => {
              const dns = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              dns.sort((a, b) => b.date - a.date);
              setDeliveryNotes(dns);
              setLoading(false);
            }, handleDbError);

            const unsubShops = onSnapshot(getCollectionRef(COLLECTIONS.SHOPS), (snapshot) => {
              setAppShops(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            }, handleDbError);

            const unsubUsers = onSnapshot(getCollectionRef(COLLECTIONS.USERS), (snapshot) => {
              setAppUsers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            }, handleDbError);

            return () => {
              unsubInventory();
              unsubTransactions();
              unsubDN();
              unsubShops();
              unsubUsers();
            };
          }, [firebaseUser]);

          const getCollectionRef = (colName) => collection(db, 'artifacts', sanitizedAppId, 'public', 'data', colName);

          const handleWipeData = async () => {
            if (!window.confirm("Are you absolutely sure you want to WIPE ALL DATA? This cannot be undone.")) return;
            try {
              const allDeletes = [];
              inventory.forEach(item => allDeletes.push(deleteDoc(doc(db, 'artifacts', sanitizedAppId, 'public', 'data', COLLECTIONS.INVENTORY, item.id))));
              transactions.forEach(item => allDeletes.push(deleteDoc(doc(db, 'artifacts', sanitizedAppId, 'public', 'data', COLLECTIONS.TRANSACTIONS, item.id))));
              deliveryNotes.forEach(item => allDeletes.push(deleteDoc(doc(db, 'artifacts', sanitizedAppId, 'public', 'data', COLLECTIONS.DELIVERY_NOTES, item.id))));
              
              await Promise.all(allDeletes);
              showToast("All data wiped successfully", "success");
            } catch (e) {
              console.error(e);
              showToast("Failed to wipe data", "error");
            }
          };

          const handleAddStock = async (articleId, quantity, target, style = '') => {
            if (!articleId || quantity <= 0) return false;
            try {
              const existingItem = inventory.find(i => i.articleId.toLowerCase() === articleId.toLowerCase());
              const newQty = parseInt(quantity);
              
              if (existingItem) {
                await updateDoc(doc(getCollectionRef(COLLECTIONS.INVENTORY), existingItem.id), {
                  quantity: existingItem.quantity + newQty,
                  lastUpdated: Date.now()
                });
              } else {
                await setDoc(doc(getCollectionRef(COLLECTIONS.INVENTORY), generateId()), {
                  articleId: articleId.toUpperCase(),
                  style: style,
                  quantity: newQty,
                  target: target,
                  lastUpdated: Date.now()
                });
              }

              await setDoc(doc(getCollectionRef(COLLECTIONS.TRANSACTIONS), generateId()), {
                type: 'IN',
                articleId: articleId.toUpperCase(),
                quantity: newQty,
                shopName: null,
                remarks: target || 'Manual Intake',
                date: Date.now()
              });
              
              return true;
            } catch (e) {
              console.error(e);
              showToast("Error adding stock", "error");
              return false;
            }
          };

          const handleDispatch = async (shopName, items, remarks = '') => {
            try {
              const batch = writeBatch(db);
              const dnNumber = `DN-${Date.now().toString().slice(-6)}`;
              const dnItems = [];
              let totalPieces = 0;

              for (const item of items) {
                const invItem = inventory.find(i => i.articleId === item.articleId);
                const qtyToDispatch = parseInt(item.quantity);
                
                if (!invItem || invItem.quantity < qtyToDispatch) {
                  throw new Error(`Not enough stock for ${item.articleId}`);
                }

                const invRef = doc(getCollectionRef(COLLECTIONS.INVENTORY), invItem.id);
                batch.update(invRef, { quantity: invItem.quantity - qtyToDispatch });

                const txRef = doc(getCollectionRef(COLLECTIONS.TRANSACTIONS), generateId());
                batch.set(txRef, {
                  type: 'OUT',
                  articleId: item.articleId,
                  quantity: qtyToDispatch,
                  shopName: shopName,
                  remarks: remarks || `Dispatched to ${shopName}`,
                  dnNumber: dnNumber,
                  date: Date.now()
                });

                dnItems.push({
                  articleId: item.articleId,
                  style: invItem.style || '-',
                  quantity: qtyToDispatch,
                  remarks: remarks
                });
                totalPieces += qtyToDispatch;
              }

              const dnRef = doc(getCollectionRef(COLLECTIONS.DELIVERY_NOTES), dnNumber);
              batch.set(dnRef, {
                dnNumber,
                shopName,
                date: Date.now(),
                items: dnItems,
                totalPieces
              });

              await batch.commit();
              
              showToast("Dispatch successful. Delivery Note Generated.", "success");
              return true;
            } catch (e) {
              console.error(e);
              showToast(e.message || "Error processing dispatch", "error");
              return false;
            }
          };

          const handleLogin = (u, p) => {
            if(!db) {
              showToast("Developer: Update Firebase Config in Code First!", "error");
              return;
            }

            const userDoc = appUsers.find(user => user.username === u && user.password === p);
            if (userDoc) {
              setLoggedInUser(userDoc);
              localStorage.setItem('abaya_logged_in_user', JSON.stringify(userDoc)); 
              if (userDoc.role === 'staff' && userDoc.permissions) {
                 const firstAllowed = ['dashboard', 'add', 'shops', 'inventory', 'history'].find(k => userDoc.permissions[k]);
                 if (firstAllowed) setActiveTab(firstAllowed);
                 else setActiveTab('profile'); 
              } else {
                 setActiveTab('dashboard');
              }
              setIsAppAuthenticated(true);
            } else if ((appUsers.length === 0 || !userDoc) && u === 'admin' && p === 'ranag3310') {
              const adminUser = { username: 'admin', role: 'admin', password: p };
              setLoggedInUser(adminUser);
              localStorage.setItem('abaya_logged_in_user', JSON.stringify(adminUser)); 
              setActiveTab('dashboard');
              setIsAppAuthenticated(true);
            } else {
              showToast("Invalid credentials", "error");
            }
          };

          const handleLogout = () => {
             setIsAppAuthenticated(false);
             setLoggedInUser(null);
             localStorage.removeItem('abaya_logged_in_user'); 
          };

          if (!isAppAuthenticated) {
            return (
              <div className="relative">
                {/* Global Error Banner (Login Screen) */}
                {dbError && (
                    <div className="absolute top-0 left-0 w-full z-50 p-4 bg-red-600 text-white font-bold text-center shadow-lg whitespace-pre-wrap">
                        {dbError}
                    </div>
                )}
                <LoginView onLogin={handleLogin} toast={toast} showToast={showToast} />
              </div>
            );
          }

          if (printData) {
            return (
              <div className="bg-white text-black min-h-screen" style={{ WebkitPrintColorAdjust: 'exact', printColorAdjust: 'exact' }}>
                <div className="max-w-4xl mx-auto p-8 print:p-0">
                  <div className="flex justify-between mb-8 print-hide">
                    <Button variant="outline" icon={X} onClick={() => setPrintData(null)}>Close & Go Back</Button>
                    <Button icon={Printer} onClick={() => { window.focus(); window.print(); }}>Print Document / Save PDF</Button>
                  </div>
                  
                  <div className="border border-gray-300 p-8 print:border-none print:p-0">
                    <div className="text-center border-b-2 border-black pb-4 mb-6">
                      <h1 className="text-3xl font-bold uppercase tracking-wider mb-2">ABAYA HOUSE</h1>
                      <p className="text-sm text-gray-600 uppercase">Enterprise Inventory & Dispatch</p>
                      <h2 className="text-xl font-bold mt-4 bg-gray-200 print:bg-gray-200 inline-block px-4 py-1">DELIVERY NOTE</h2>
                    </div>
                    
                    <div className="flex justify-between mb-8 text-sm">
                      <div>
                        <p><strong>To:</strong> {printData.shopName}</p>
                        <p><strong>Date:</strong> {formatDate(printData.date)}</p>
                      </div>
                      <div className="text-right">
                        <p><strong>DN Number:</strong> {printData.dnNumber}</p>
                      </div>
                    </div>

                    <table className="w-full text-left border-collapse border border-black mb-8 text-sm">
                      <thead>
                        <tr className="bg-gray-100 print:bg-gray-200">
                          <th className="border border-black p-2 w-16 text-center">S.No</th>
                          <th className="border border-black p-2">Article ID</th>
                          <th className="border border-black p-2">Style</th>
                          <th className="border border-black p-2 w-24 text-center">Quantity</th>
                          <th className="border border-black p-2">Remarks</th>
                        </tr>
                      </thead>
                      <tbody>
                        {printData.items.map((item, idx) => (
                          <tr key={idx}>
                            <td className="border border-black p-2 text-center">{idx + 1}</td>
                            <td className="border border-black p-2 font-medium">{item.articleId}</td>
                            <td className="border border-black p-2">{item.style}</td>
                            <td className="border border-black p-2 text-center">{item.quantity}</td>
                            <td className="border border-black p-2">{item.remarks}</td>
                          </tr>
                        ))}
                      </tbody>
                      <tfoot>
                        <tr className="font-bold bg-gray-50 print:bg-gray-100">
                          <td colSpan="3" className="border border-black p-2 text-right">TOTAL PIECES:</td>
                          <td className="border border-black p-2 text-center text-lg">{printData.totalPieces}</td>
                          <td className="border border-black p-2"></td>
                        </tr>
                      </tfoot>
                    </table>

                    <div className="flex justify-between mt-24 pt-8 text-sm">
                      <div className="text-center w-48 border-t border-black pt-2">
                        <p>Prepared By</p>
                        <p className="text-gray-500 text-xs">{loggedInUser?.username || 'Admin'}</p>
                      </div>
                      <div className="text-center w-48 border-t border-black pt-2">
                        <p>Received By</p>
                        <p className="text-gray-500 text-xs">(Signature & Stamp)</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          }

          if (printReport) {
            return (
              <div className="bg-white text-black min-h-screen" style={{ WebkitPrintColorAdjust: 'exact', printColorAdjust: 'exact' }}>
                <div className="max-w-4xl mx-auto p-8 print:p-0">
                  <div className="flex justify-between mb-8 print-hide">
                    <Button variant="outline" icon={X} onClick={() => setPrintReport(null)}>Close & Go Back</Button>
                    <Button icon={Printer} onClick={() => { window.focus(); window.print(); }}>Save as PDF / Print</Button>
                  </div>
                  
                  <div className="border border-gray-300 p-8 print:border-none print:p-0">
                    <div className="text-center border-b-2 border-black pb-4 mb-6">
                      <h1 className="text-3xl font-bold uppercase tracking-wider mb-2">ABAYA HOUSE</h1>
                      <p className="text-sm text-gray-600 uppercase">Enterprise Inventory & Dispatch</p>
                      <h2 className="text-xl font-bold mt-4 bg-gray-200 print:bg-gray-200 inline-block px-4 py-1">
                        {printReport.type === 'INVENTORY' ? 'CURRENT STOCK REPORT' : 'TRANSACTION LEDGER'}
                      </h2>
                    </div>
                    
                    <div className="flex justify-between mb-8 text-sm">
                      <div>
                        <p><strong>Generated By:</strong> {loggedInUser?.username || 'Admin'}</p>
                      </div>
                      <div className="text-right">
                        <p><strong>Date & Time:</strong> {new Date().toLocaleString('en-GB')}</p>
                        <p><strong>Total Records:</strong> {printReport.data.length}</p>
                      </div>
                    </div>

                    <table className="w-full text-left border-collapse border border-black mb-8 text-sm">
                      <thead>
                        <tr className="bg-gray-100 print:bg-gray-200">
                          <th className="border border-black p-2 w-16 text-center">S.No</th>
                          <th className="border border-black p-2">Article ID</th>
                          {printReport.type === 'INVENTORY' ? (
                            <>
                              <th className="border border-black p-2">Style / Color</th>
                              <th className="border border-black p-2 text-center w-24">Quantity</th>
                              <th className="border border-black p-2">Last Intake / Target</th>
                            </>
                          ) : (
                            <>
                              <th className="border border-black p-2 text-center">Type</th>
                              <th className="border border-black p-2 text-center w-24">Qty</th>
                              <th className="border border-black p-2">Date</th>
                              <th className="border border-black p-2">Destination / Remarks</th>
                            </>
                          )}
                        </tr>
                      </thead>
                      <tbody>
                        {printReport.data.map((item, idx) => (
                          <tr key={item.id || idx}>
                            <td className="border border-black p-2 text-center">{idx + 1}</td>
                            <td className="border border-black p-2 font-bold">{item.articleId}</td>
                            {printReport.type === 'INVENTORY' ? (
                              <>
                                <td className="border border-black p-2">{item.style || '-'}</td>
                                <td className="border border-black p-2 text-center font-bold">{item.quantity}</td>
                                <td className="border border-black p-2">{item.target || '-'}</td>
                              </>
                            ) : (
                              <>
                                <td className="border border-black p-2 text-center font-bold">{item.type}</td>
                                <td className="border border-black p-2 text-center">{item.type === 'IN' ? '+' : '-'}{item.quantity}</td>
                                <td className="border border-black p-2 whitespace-nowrap">{formatDate(item.date)}</td>
                                <td className="border border-black p-2">{item.shopName || item.remarks || '-'}</td>
                              </>
                            )}
                          </tr>
                        ))}
                        {printReport.data.length === 0 && (
                          <tr>
                            <td colSpan="5" className="border border-black p-4 text-center text-gray-500">No records found.</td>
                          </tr>
                        )}
                      </tbody>
                    </table>

                    <div className="mt-16 pt-8 text-sm text-center text-gray-500 border-t border-gray-300">
                      <p>This is a computer-generated document. No signature is required.</p>
                      <p className="text-xs mt-1">Software Developed by Mr. Abubakar</p>
                    </div>
                  </div>
                </div>
              </div>
            );
          }

          // Apply UI Theme
          const themeClass = uiTheme === '3d' ? 'theme-3d' : uiTheme === 'glass' ? 'theme-glass' : '';

          return (
            <div className={`flex h-screen w-full font-sans transition-colors duration-300 relative ${themeClass}`}>
              
              {/* Global Error Banner (Inside App) */}
              {dbError && (
                  <div className="absolute top-0 left-0 w-full z-[100] p-4 bg-red-600 text-white font-bold text-center shadow-lg whitespace-pre-wrap">
                      {dbError}
                  </div>
              )}

              <div className="w-64 bg-slate-900 text-slate-300 flex flex-col shadow-xl flex-shrink-0 z-10 border-r border-slate-800">
                <div className="p-6 flex items-center gap-3 transition-transform hover:scale-105 cursor-pointer">
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white shadow-[0_0_15px_rgba(99,102,241,0.5)]">
                    <Package className="w-6 h-6 animate-pulse" />
                  </div>
                  <div className="flex flex-col">
                    <span className="text-base font-bold text-white tracking-wide leading-tight">Abaya House</span>
                    <span className="text-[10px] text-indigo-300 uppercase tracking-widest font-semibold">Inventory App</span>
                  </div>
                </div>
                
                <nav className="flex-1 px-4 space-y-2 mt-4">
                  {hasAccess('dashboard') && <NavItem icon={LayoutDashboard} label="Dashboard" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />}
                  {hasAccess('add') && <NavItem icon={PlusCircle} label="Master Intake" active={activeTab === 'add'} onClick={() => setActiveTab('add')} />}
                  {hasAccess('shops') && <NavItem icon={Store} label="Shop Ledgers" active={activeTab === 'shops'} onClick={() => setActiveTab('shops')} />}
                  {hasAccess('inventory') && <NavItem icon={Package} label="Current Stock" active={activeTab === 'inventory'} onClick={() => setActiveTab('inventory')} />}
                  {hasAccess('history') && <NavItem icon={History} label="History Log" active={activeTab === 'history'} onClick={() => setActiveTab('history')} />}
                  <NavItem icon={Settings} label="My Settings" active={activeTab === 'profile'} onClick={() => setActiveTab('profile')} />
                  {loggedInUser?.role === 'admin' && (
                    <NavItem icon={Database} label="Master DB" active={activeTab === 'adminDB'} onClick={() => setActiveTab('adminDB')} />
                  )}
                </nav>

                <div className="p-4 border-t border-slate-800 bg-slate-900/50">
                  <div className="flex items-center justify-between mb-4 px-2">
                    <span className="text-sm font-medium">Dark Mode</span>
                    <button onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} className="p-2 rounded-full hover:bg-slate-700 bg-slate-800 transition-all hover:scale-110 shadow-sm border border-slate-700">
                      {theme === 'dark' ? <Sun className="w-4 h-4 text-yellow-400" /> : <Moon className="w-4 h-4 text-indigo-400" />}
                    </button>
                  </div>
                  <button onClick={handleLogout} className="flex items-center justify-center gap-2 w-full px-4 py-2.5 text-sm text-red-400 hover:text-red-300 hover:bg-red-500/10 rounded-lg transition-colors border border-transparent hover:border-red-500/20">
                    <LogOut className="w-4 h-4" /> Sign Out
                  </button>
                  {/* Sidebar Developer Credit */}
                  <div className="mt-6 text-center">
                    <p className="text-[11px] text-slate-500 font-bold tracking-wider">DEVELOPED BY MR. ABUBAKAR</p>
                    <p className="text-[9px] text-slate-600 mt-1 uppercase tracking-widest">© 2026 All Rights Reserved</p>
                  </div>
                </div>
              </div>

              <div className={`flex-1 flex flex-col overflow-hidden relative ${dbError ? 'pt-16' : ''}`}>
                <header className="h-16 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-8 flex-shrink-0 z-10 shadow-sm">
                  <h1 className="text-xl font-bold capitalize bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">{activeTab.replace(/([A-Z])/g, ' $1').trim()}</h1>
                  <div className="flex items-center gap-4">
                    {loading && !dbError && <span className="text-sm font-medium text-indigo-500 animate-pulse flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-indigo-500"></div> Syncing Database...</span>}
                    <div className="w-9 h-9 rounded-full bg-gradient-to-br from-indigo-100 to-purple-100 dark:from-indigo-900 dark:to-purple-900 flex items-center justify-center text-indigo-600 dark:text-indigo-300 font-bold border border-indigo-200 dark:border-indigo-700 uppercase shadow-sm">
                      {loggedInUser?.username?.charAt(0) || 'A'}
                    </div>
                  </div>
                </header>
                
                <main className="flex-1 overflow-y-auto p-8 relative scroll-smooth">
                  <div className="max-w-6xl mx-auto space-y-6 pb-20">
                    {activeTab === 'dashboard' && <DashboardView inventory={inventory} transactions={transactions} onWipe={handleWipeData} showToast={showToast} loggedInUser={loggedInUser} />}
                    {activeTab === 'add' && <AddStockView onAdd={handleAddStock} showToast={showToast} />}
                    {activeTab === 'shops' && <ShopsView shops={appShops} inventory={inventory} onDispatch={handleDispatch} deliveryNotes={deliveryNotes} showToast={showToast} onPrint={setPrintData} />}
                    {activeTab === 'inventory' && <InventoryView inventory={inventory} getCollectionRef={getCollectionRef} showToast={showToast} onPrint={(data) => setPrintReport({ type: 'INVENTORY', data })} />}
                    {activeTab === 'history' && <HistoryView transactions={transactions} onPrint={(data) => setPrintReport({ type: 'HISTORY', data })} />}
                    {activeTab === 'profile' && <ProfileView loggedInUser={loggedInUser} showToast={showToast} uiTheme={uiTheme} setUiTheme={setUiTheme} />}
                    {activeTab === 'adminDB' && loggedInUser?.role === 'admin' && <MasterDataView appShops={appShops} appUsers={appUsers} getCollectionRef={getCollectionRef} showToast={showToast} />}
                  </div>
                </main>

                {toast && (
                  <div className={`absolute bottom-6 right-6 px-6 py-3 rounded-lg shadow-2xl flex items-center gap-3 animate-in slide-in-from-bottom-5 duration-300 z-50 font-medium ${
                    toast.type === 'error' ? 'bg-red-600 text-white' : 'bg-emerald-600 text-white'
                  }`}>
                    {toast.type === 'error' ? <AlertTriangle className="w-5 h-5" /> : <Check className="w-5 h-5" />}
                    {toast.message}
                  </div>
                )}
              </div>
            </div>
          );
        }

        // --- Sub Views Components ---
        const NavItem = ({ icon: Icon, label, active, onClick }) => (
          <button
            onClick={onClick}
            className={`flex items-center gap-3 w-full px-4 py-3 rounded-xl text-sm font-semibold transition-all duration-300 hover:translate-x-1.5 ${
              active 
                ? 'bg-gradient-to-r from-indigo-600 to-indigo-500 text-white shadow-lg shadow-indigo-500/30' 
                : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'
            }`}
          >
            <Icon className={`w-5 h-5 ${active ? 'animate-pulse' : ''}`} />
            {label}
          </button>
        );

        const LoginView = ({ onLogin, toast, showToast }) => {
          const [username, setUsername] = useState('');
          const [password, setPassword] = useState('');
          const [isScanning, setIsScanning] = useState(false);

          const handleFingerprintLogin = async () => {
            const stored = localStorage.getItem('abaya_fingerprint');
            if (!stored) {
                showToast("Pehle system ke andar 'My Settings' se apna fingerprint register karein!", "error");
                return;
            }

            setIsScanning(true);
            try {
                const parsed = JSON.parse(stored);
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);
                
                const allowCredentials = [{
                    type: 'public-key',
                    id: new Uint8Array(parsed.id)
                }];

                await navigator.credentials.get({
                    publicKey: {
                        challenge,
                        rpId: window.location.hostname,
                        allowCredentials,
                        userVerification: "required"
                    }
                });
                
                showToast("Fingerprint Matched!", "success");
                onLogin(parsed.u, parsed.p);
            } catch(err) {
                console.error(err);
                if (err.name === 'NotAllowedError' || err.message?.includes('enabled in this document')) {
                    const parsed = JSON.parse(stored);
                    showToast("Preview Mode: Fingerprint simulated. GitHub par asli scanner chalega!", "success");
                    onLogin(parsed.u, parsed.p);
                } else {
                    showToast("Fingerprint scan cancel ho gaya ya match nahi hua.", "error");
                }
            } finally {
                setIsScanning(false);
            }
          };

          return (
            <div 
              className="min-h-screen flex items-center justify-center text-white animate-bg-pan relative overflow-hidden bg-cover bg-center"
              style={{ backgroundImage: "url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=2560&auto=format&fit=crop')" }}
            >
              <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-[2px] z-0"></div>
              
              {/* Floating Particles Animation */}
              <div className="particle w-2 h-2 left-[10%] z-0" style={{ animationDuration: '8s', animationDelay: '1s' }}></div>
              <div className="particle w-3 h-3 left-[30%] z-0" style={{ animationDuration: '12s', animationDelay: '3s' }}></div>
              <div className="particle w-1.5 h-1.5 left-[60%] z-0" style={{ animationDuration: '9s', animationDelay: '0s' }}></div>
              <div className="particle w-4 h-4 left-[80%] z-0" style={{ animationDuration: '14s', animationDelay: '5s' }}></div>
              <div className="particle w-2.5 h-2.5 left-[90%] z-0" style={{ animationDuration: '10s', animationDelay: '2s' }}></div>

              <div className="w-full max-w-md p-10 bg-slate-900/50 backdrop-blur-2xl rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.8)] border border-white/10 mt-12 animate-in fade-in zoom-in-95 duration-700 relative z-10 hover:border-white/30 transition-all hover:shadow-[0_0_60px_rgba(99,102,241,0.3)] hover:-translate-y-2">
                <div className="text-center mb-10">
                  <div className="w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl mx-auto flex items-center justify-center text-white mb-6 shadow-[0_0_30px_rgba(99,102,241,0.6)] animate-float hover:scale-110 transition-transform duration-500">
                    <Package className="w-10 h-10 animate-pulse" />
                  </div>
                  <h1 className="text-2xl font-extrabold tracking-tight leading-tight drop-shadow-md">Inventory Management App</h1>
                  <p className="text-indigo-200 font-semibold text-sm mt-2 uppercase tracking-widest drop-shadow-sm">for Abaya House</p>
                </div>
                <form onSubmit={(e) => { e.preventDefault(); onLogin(username, password); }} className="space-y-5 relative">
                  <div className="animate-in slide-in-from-left-4 duration-500 delay-100 fill-mode-both">
                    <Input label="Username" value={username} onChange={e => setUsername(e.target.value)} required />
                  </div>
                  <div className="animate-in slide-in-from-right-4 duration-500 delay-200 fill-mode-both">
                    <Input label="Password" type="password" value={password} onChange={e => setPassword(e.target.value)} required />
                  </div>
                  <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 delay-300 fill-mode-both">
                    <Button type="submit" className="w-full mt-4 py-3.5 text-lg font-bold bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 border-none shadow-lg shadow-indigo-500/40 hover:shadow-indigo-500/60 transition-all">Login to Portal</Button>
                  </div>
                </form>
                
                {/* Fingerprint Quick Login Feature */}
                <div className="mt-8 flex flex-col items-center border-t border-slate-700/50 pt-6 animate-in fade-in slide-in-from-bottom-6 duration-500 delay-500 fill-mode-both">
                  <p className="text-[10px] text-slate-400 mb-3 uppercase tracking-widest font-semibold">Or tap to scan fingerprint</p>
                  <button
                    type="button"
                    onClick={handleFingerprintLogin}
                    disabled={isScanning}
                    className={`relative flex items-center justify-center w-16 h-16 rounded-full border-2 transition-all duration-300 overflow-hidden ${isScanning ? 'border-indigo-500 bg-indigo-500/20 shadow-[0_0_20px_rgba(99,102,241,0.6)]' : 'border-slate-600 hover:border-indigo-400 hover:bg-indigo-500/10'}`}
                  >
                    <Fingerprint className={`w-8 h-8 ${isScanning ? 'text-indigo-400 animate-pulse' : 'text-slate-400'}`} />
                    {isScanning && <div className="absolute top-0 left-0 w-full h-1 bg-indigo-400 shadow-[0_0_10px_#818cf8] animate-[scan_1.5s_ease-in-out_infinite]"></div>}
                  </button>
                  {isScanning && <p className="text-xs text-indigo-300 font-medium mt-3 animate-pulse">Scanning...</p>}
                </div>
              </div>

                    timeout: 60000,
                    attestation: "none"
                };

                const credential = await navigator.credentials.create({ publicKey });
                const rawId = Array.from(new Uint8Array(credential.rawId));
                
                localStorage.setItem('abaya_fingerprint', JSON.stringify({
