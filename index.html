<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REESHA ABAYA - Management System</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- FIREBASE CONFIG ---
        // Yahan apni Firebase details dalen agar save karna chahte hain
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        function App() {
            const [items, setItems] = useState([{ code: '', style: '', qty: '' }]);
            const [shopName, setShopName] = useState('');

            const addItem = () => setItems([...items, { code: '', style: '', qty: '' }]);
            
            const handleSave = async () => {
                try {
                    await db.collection("deliveries").add({
                        shopName,
                        items,
                        date: new Date().toISOString()
                    });
                    alert("Data Online Save Ho Gaya!");
                } catch (e) {
                    console.error("Error: ", e);
                    alert("Save karne ke liye Firebase Config sahi karen.");
                }
            };

            return (
                <div className="max-w-4xl mx-auto p-6 bg-white shadow-lg mt-10 rounded-xl">
                    <div className="text-center mb-8">
                        <h1 className="text-4xl font-bold text-gray-800">REESHA ABAYA</h1>
                        <p className="text-blue-600 font-semibold text-lg">DELIVERY NOTE SYSTEM</p>
                    </div>

                    <div className="mb-6">
                        <label className="block text-sm font-medium text-gray-700">Shop Name / Destination</label>
                        <input 
                            type="text" 
                            className="mt-1 block w-full p-2 border border-gray-300 rounded-md" 
                            placeholder="e.g. ENEM DHA / Liberty"
                            value={shopName}
                            onChange={(e) => setShopName(e.target.value)}
                        />
                    </div>

                    <table className="w-full mb-6 border-collapse border border-gray-200">
                        <thead>
                            <tr className="bg-gray-100">
                                <th className="border p-2">Product Code</th>
                                <th className="border p-2">Style</th>
                                <th className="border p-2">Qty</th>
                            </tr>
                        </thead>
                        <tbody>
                            {items.map((item, idx) => (
                                <tr key={idx}>
                                    <td className="border p-2"><input className="w-full outline-none" placeholder="Code" /></td>
                                    <td className="border p-2"><input className="w-full outline-none" placeholder="Style" /></td>
                                    <td className="border p-2"><input className="w-full outline-none" type="number" placeholder="0" /></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>

                    <div className="flex gap-4">
                        <button onClick={addItem} className="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300 font-bold">+ Add Row</button>
                        <button onClick={handleSave} className="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 font-bold shadow-lg">Save to Online Database</button>
                        <button onClick={() => window.print()} className="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 font-bold shadow-lg">Print PDF</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
